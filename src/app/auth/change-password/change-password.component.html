<div class="modal-header bg-primary text-uppercase py-2">
  <h6 class="modal-title text-white">Đổi mật khẩu</h6>
  <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
</div>

<div class="modal-body">
  <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()" nzLayout="vertical" class="change-password-form">
    <!-- Old Password -->
    <div class="form-group">
      <label class="label">Mật khẩu hiện tại</label>
      <nz-form-item>
        <nz-form-control nzErrorTip="Vui lòng nhập mật khẩu hiện tại!">
          <nz-input-group [nzPrefix]="prefixOld" [nzSuffix]="suffixOld">
            <input [type]="passwordVisibleOld ? 'text' : 'password'" nz-input formControlName="oldPassword"
              placeholder="Nhập mật khẩu cũ" />
          </nz-input-group>
          <ng-template #prefixOld><span nz-icon nzType="key"></span></ng-template>
          <ng-template #suffixOld>
            <span nz-icon [nzType]="passwordVisibleOld ? 'eye-invisible' : 'eye'"
              (click)="passwordVisibleOld = !passwordVisibleOld"></span>
          </ng-template>
        </nz-form-control>
      </nz-form-item>
    </div>

    <!-- New Password -->
    <div class="form-group">
      <label class="label">Mật khẩu mới</label>
      <nz-form-item>
        <nz-form-control nzErrorTip="Vui lòng nhập mật khẩu mới!">
          <nz-input-group [nzPrefix]="prefixNew" [nzSuffix]="suffixNew">
            <input [type]="passwordVisibleNew ? 'text' : 'password'" nz-input formControlName="newPassword"
              placeholder="Nhập mật khẩu mới" (ngModelChange)="validateConfirmPassword()" />
          </nz-input-group>
          <ng-template #prefixNew><span nz-icon nzType="lock"></span></ng-template>
          <ng-template #suffixNew>
            <span nz-icon [nzType]="passwordVisibleNew ? 'eye-invisible' : 'eye'"
              (click)="passwordVisibleNew = !passwordVisibleNew"></span>
          </ng-template>
        </nz-form-control>
      </nz-form-item>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label class="label">Xác nhận mật khẩu mới</label>
      <nz-form-item>
        <nz-form-control [nzErrorTip]="errorConfirm">
          <nz-input-group [nzPrefix]="prefixConfirm" [nzSuffix]="suffixConfirm">
            <input [type]="passwordVisibleConfirm ? 'text' : 'password'" nz-input formControlName="confirmPassword"
              placeholder="Nhập lại mật khẩu mới" />
          </nz-input-group>
          <ng-template #prefixConfirm><span nz-icon nzType="check-circle"></span></ng-template>
          <ng-template #suffixConfirm>
            <span nz-icon [nzType]="passwordVisibleConfirm ? 'eye-invisible' : 'eye'"
              (click)="passwordVisibleConfirm = !passwordVisibleConfirm"></span>
          </ng-template>
          <ng-template #errorConfirm let-control>
            <ng-container *ngIf="control.hasError('required')">Vui lòng xác nhận mật khẩu!</ng-container>
            <ng-container *ngIf="control.hasError('confirm')">Mật khẩu xác nhận không chính xác!</ng-container>
          </ng-template>
        </nz-form-control>
      </nz-form-item>
    </div>


  </form>
</div>

<div class="modal-footer">
  <button nz-button nzDanger type="button" (click)="onCancel()" [disabled]="loading">
    Hủy bỏ
  </button>
  <button nz-button nzType="primary" (click)="submitForm()" [nzLoading]="loading">
    Cập nhật
  </button>
</div>
