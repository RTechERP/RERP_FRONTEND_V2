<nz-spin [nzSpinning]="isLoading" nzTip="Đang tải dữ liệu..." style="height: 100%; width: 100%; display: block;">
  <div class="detail-modal-root">
  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div class="dm-toolbar">
    <button nz-button nzType="default" nzSize="small" (click)="exportToExcel()">
      <img src="assets/icon/action_export_excel_16.png" alt="Excel" class="me-1" />
      Xuất Excel
    </button>

    <nz-divider nzType="vertical"></nz-divider>

    <label class="dm-label">Năm:</label>
    <nz-input-number
      [(ngModel)]="yearValue"
      [nzMin]="2021"
      [nzMax]="9999"
      [nzStep]="1"
      nzSize="small"
      style="width: 80px;"
    ></nz-input-number>

    <label class="dm-label">Quý:</label>
    <nz-input-number
      [(ngModel)]="quarter"
      [nzMin]="1"
      [nzMax]="4"
      [nzStep]="1"
      nzSize="small"
      style="width: 60px;"
    ></nz-input-number>

    <label class="dm-label">Loại đề thi:</label>
    <nz-select
      [(ngModel)]="examType"
      nzSize="small"
      style="width: 130px;"
    >
      <nz-option *ngFor="let opt of examTypeOptions" [nzValue]="opt.value" [nzLabel]="opt.label"></nz-option>
    </nz-select>

    <button nz-button nzType="primary" nzSize="small" (click)="loadData()">
      <span nz-icon nzType="search"></span> TÌM KIẾM
    </button>
  </div>

  <!-- ── Info panel ─────────────────────────────────────────────────────── -->
  <div class="dm-info-panel">
    <div class="dm-info-row"><span class="dm-info-label">NĂM:</span><span class="dm-info-value">{{ yearValue }}</span></div>
    <div class="dm-info-row"><span class="dm-info-label">QUÝ:</span><span class="dm-info-value">{{ quarter }}</span></div>
    <div class="dm-info-row"><span class="dm-info-label">LOẠI ĐỀ:</span><span class="dm-info-value">{{ examTypeName }}</span></div>
    <div class="dm-info-row"><span class="dm-info-label">NGƯỜI THAM GIA:</span><span class="dm-info-value">{{ employeeName }}</span></div>
  </div>

  <!-- ── Tables area ────────────────────────────────────────────────────── -->
  <div class="dm-tables-area">
    <!-- Left: chi tiết câu hỏi -->
    <div class="dm-detail-wrap">
      <div class="dm-section-header">Chi tiết câu hỏi</div>
      <div #DetailTable class="dm-table-container"></div>
    </div>

    <!-- Right: tổng kết -->
    <div class="dm-summary-wrap">
      <div class="dm-section-header">Tổng kết theo nhóm</div>
      <div #SummaryTable class="dm-table-container"></div>
    </div>
  </div>
</div>
</nz-spin>
