<ng-container class="w-100">
  <nz-splitter>
    <nz-splitter-panel nzDefaultSize="100%">
      <div class="card h-100 border-0 rounded-0">
        <!-- Toolbar -->
        <div class="card-header bg-white p-1">
          <div class="d-flex gap-2 align-items-center flex-wrap justify-content-between">
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="fs-12" nz-button nzType="default" nzSize="small" (click)="exportToExcel()">
                <img src="assets/icon/action_export_excel_16.png" alt="Xuất Excel" class="me-1" />Xuất Excel
              </button>

              <!-- Năm & Quý filter moved here -->
              <div class="d-flex gap-2 align-items-center flex-wrap">
                <nz-form-item class="mb-0">
                  <nz-form-control>
                    <label class="me-1 fs-12">Năm:</label>
                    <nz-input-number [(ngModel)]="yearValue" [nzMin]="2021" [nzMax]="9999" [nzStep]="1" nzSize="small"
                      style="width: 80px;" class="fs-12"></nz-input-number>
                  </nz-form-control>
                </nz-form-item>
                <nz-form-item class="mb-0">
                  <nz-form-control>
                    <label class="me-1 fs-12">Quý:</label>
                    <nz-input-number [(ngModel)]="quarter" [nzMin]="1" [nzMax]="4" [nzStep]="1" nzSize="small"
                      style="width: 60px;" class="fs-12"></nz-input-number>
                  </nz-form-control>
                </nz-form-item>
              </div>

              <nz-divider nzType="vertical"></nz-divider>
              <button class="fs-12" nz-button nzType="default" nzSize="small" (click)="loadData()">
                <span nz-icon nzType="reload"></span> Làm mới
              </button>

            </div>
          </div>
        </div>

        <!-- Body: split left (course list) / right (exam results) -->
        <div class="card-body p-0">
          <nz-splitter [nzLayout]="splitterLayout">
            <!-- Left panel: Danh sách khóa thi -->
            <nz-splitter-panel nzDefaultSize="25%" nzMin="15%" nzMax="50%">
              <div class="box">
                <ng-container class="w-100">
                  <nz-splitter>
                    <nz-splitter-panel nzDefaultSize="100%">
                      <div class="card h-100 border-0 rounded-0">
                        <div class="card-header bg-white p-1">
                          <div class="d-flex gap-1">
                            <span class="fw-bold fs-12">Danh sách kỳ thi</span>
                          </div>
                        </div>
                        <div class="card-body p-0">
                          <div #CourseTable style="width: 100%; height: 100%"></div>
                        </div>
                      </div>
                    </nz-splitter-panel>
                  </nz-splitter>
                </ng-container>
              </div>
            </nz-splitter-panel>

            <!-- Right panel: Kết quả thi -->
            <nz-splitter-panel nzDefaultSize="75%" nzMin="50%" nzMax="85%">
              <div class="box">
                <ng-container class="w-100">
                  <nz-splitter>
                    <nz-splitter-panel nzDefaultSize="100%">
                      <div class="card h-100 border-0 rounded-0">
                        <div class="card-header bg-white p-1">
                          <div class="d-flex gap-1">
                            <span class="fw-bold fs-12">Kết quả thi</span>
                          </div>
                        </div>
                        <div class="card-body p-0">
                          <nz-spin [nzSpinning]="isExamResultLoading" nzTip="Đang tải..."
                            style="height: 100%; display: block;">
                            <div #ExamResultTable style="width: 100%; height: 100%"></div>
                          </nz-spin>
                        </div>
                      </div>
                    </nz-splitter-panel>
                  </nz-splitter>
                </ng-container>
              </div>
            </nz-splitter-panel>
          </nz-splitter>
        </div>
      </div>
    </nz-splitter-panel>
  </nz-splitter>
</ng-container>
