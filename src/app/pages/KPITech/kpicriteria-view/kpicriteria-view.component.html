<!-- HEADER -->
<div class="modal-header bg-primary align-items-center ps-2" style="flex-shrink: 0">
    <h6 class="text-light text-uppercase m-0" style="padding: 0 0.5rem">
        Bảng tiêu chí đánh giá
    </h6>
    <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"
        style="background-color:lightcyan !important; font-weight: bold;"></button>
</div>
<!-- Modal Header với Year và Quarter -->
<div class="card-header bg-white p-1 d-flex gap-1 flex-wrap align-items-center toolbar" style="flex-shrink: 0;">
    <div style="display: flex; gap: 24px; align-items: center;">
        <!-- Năm -->
        <div style="display: flex; align-items: center; gap: 8px;">
            <label style="font-weight: 600; color: #333;">Năm:</label>
            <nz-input-number nzSize="small" [(ngModel)]="criteriaYear" (ngModelChange)="onYearChange($event)" [nzMin]="2024" [nzMax]="2100"
                [nzStep]="1" style="width: 100px;">
            </nz-input-number>
        </div>

        <!-- Quý -->
        <div style="display: flex; align-items: center; gap: 8px;">
            <label style="font-weight: 600; color: #333;">Quý:</label>
            <nz-input-number nzSize="small" [(ngModel)]="criteriaQuarter" (ngModelChange)="onQuarterChange($event)" [nzMin]="1" [nzMax]="4"
                [nzStep]="1" style="width: 100px;">
            </nz-input-number>
        </div>
    </div>
</div>

<!-- Grid hiển thị thang điểm đánh giá -->
<div class="evaluate-point-section" style="padding: 8px;">
    <div class="grid-evaluate-point-container" style="width: 100%;" *ngIf="gridsInitialized">
        <app-custom-table-kpi #gridEvaluatePoint [columns]="evaluatePointColumns" [data]="dataEvaluatePoint"
            [height]="'100px'" [showCaption]="false" [showColumnFilter]="false" [resizable]="true"
            [columnAutoWidth]="true" [scrollable]="true">
        </app-custom-table-kpi>
    </div>
</div>

<!-- Tab control -->
<div class="flex-grow-1" style="min-height: 0; overflow: hidden; flex: 1; padding: 0 8px;">
    <nz-tabset [(nzSelectedIndex)]="selectedTabIndex">
        <!-- Tab 1: Bảng tiêu chí -->
        <nz-tab nzTitle="BẢNG TIÊU CHÍ">
            <div class="grid-criteria-container" style="width: 100%;"
                *ngIf="gridsInitialized && selectedTabIndex === 0">
                <app-custom-table-kpi #gridCriteria [columns]="criteriaColumns" [data]="dataCriteria"
                    [headerGroups]="criteriaHeaderGroups" [height]="'500px'" [dataKey]="'id'" [resizable]="true"
                    [scrollable]="true">
                </app-custom-table-kpi>
            </div>
        </nz-tab>

        <!-- Tab 2: Loại dự án -->
        <nz-tab nzTitle="LOẠI DỰ ÁN">
            <div class="grid-project-type-container" style="width: 100%;"
                *ngIf="gridsInitialized && selectedTabIndex === 1">
                <app-custom-table-kpi #gridProjectType [columns]="projectTypeColumns" [data]="dataProjectType"
                    [height]="'500px'" [dataKey]="'id'" [resizable]="true" [scrollable]="true">
                </app-custom-table-kpi>
            </div>
        </nz-tab>
    </nz-tabset>
</div>
