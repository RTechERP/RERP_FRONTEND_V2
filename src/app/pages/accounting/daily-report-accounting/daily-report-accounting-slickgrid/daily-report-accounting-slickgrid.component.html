<ng-container class="w-100">
    <div class="card h-100 border-0 rounded-0 d-flex flex-column">
        <!-- Header với p-menubar -->
        <div class="card-header bg-white p-0" style="flex-shrink: 0;">
            <p-menubar [model]="menuBars">
                <ng-template pTemplate="item" let-item>
                    <a class="p-menuitem-link" [ngClass]="item.styleClass">
                        <i [class]="item.icon"></i>
                        <span class="p-menuitem-text">{{ item.label }}</span>
                    </a>
                </ng-template>

                <ng-template #end>
                    <div class="d-flex align-items-center gap-2">
                        <button nz-button nzType="text" nzShape="circle" *ngIf="isMobile"
                            (click)="isShowModal = true; $event.stopPropagation()">
                            <nz-icon nzType="search" />
                        </button>
                    </div>
                </ng-template>
            </p-menubar>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar bg-light border-bottom p-2" *ngIf="!isMobile">
            <form nz-form nzLayout="inline" class="d-flex flex-wrap gap-2 align-items-center">
                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12"
                        style="font-size: 12px; display: flex; align-items: center; margin-right: 6px;">Từ
                        ngày</nz-form-label>
                    <nz-form-control>
                        <input type="date" class="ant-input" style="width: 130px; font-size: 12px; height: 24px;"
                            [(ngModel)]="filters.dateStart" name="startDate" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12"
                        style="font-size: 12px; display: flex; align-items: center; margin-right: 6px;">Đến
                        ngày</nz-form-label>
                    <nz-form-control>
                        <input type="date" class="ant-input" style="width: 130px; font-size: 12px; height: 24px;"
                            [(ngModel)]="filters.dateEnd" name="endDate" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12"
                        style="font-size: 12px; display: flex; align-items: center; margin-right: 6px;">Nhân
                        viên</nz-form-label>
                    <nz-form-control>
                        <nz-select name="employeeId" nzShowSearch nzAllowClear nzSize="small" nzPlaceHolder="Nhân viên"
                            nzDropdownClassName="select-dropdown" style="width: 220px;" [(ngModel)]="filters.employeeId"
                            [nzDisabled]="isEmployeeIdDisabled">
                            <nz-option *ngFor="let item of employees" [nzValue]="item.ID"
                                [nzLabel]="item.Code + ' - ' + item.FullName"></nz-option>
                        </nz-select>
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12"
                        style="font-size: 12px; display: flex; align-items: center; margin-right: 6px;">Từ
                        khóa</nz-form-label>
                    <nz-form-control>
                        <input nz-input placeholder="Nhập từ khóa" nzSize="small" [(ngModel)]="filterTextSearch"
                            name="filterText" style="width: 200px; font-size: 12px;" (keyup.enter)="searchData()" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-control>
                        <button nz-button nzType="primary" nzSize="small" (click)="searchData()">
                            Tìm kiếm
                        </button>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </div>

        <!-- Modal tìm kiếm cho mobile -->
        <nz-modal [(nzVisible)]="isShowModal" nzTitle="Tìm kiếm" nzWidth="100vw" nzCentered
            [nzBodyStyle]="{padding: '0px 24px' }" (nzOnCancel)="isShowModal = false"
            (nzOnOk)="searchData(); isShowModal = false">
            <ng-container *nzModalContent>
                <form nz-form class="ant-advanced-search-form">
                    <div nz-row [nzGutter]="16">
                        <div nz-col [nzSpan]="12">
                            <nz-form-item style="margin-bottom: 12px;">
                                <nz-form-label>Từ ngày</nz-form-label>
                                <nz-form-control>
                                    <input type="date" class="ant-input"
                                        style="width: 100%; font-size: 12px; height: 30px;"
                                        [(ngModel)]="filters.dateStart" name="modalStartDate" />
                                </nz-form-control>
                            </nz-form-item>
                        </div>

                        <div nz-col [nzSpan]="12">
                            <nz-form-item style="margin-bottom: 12px;">
                                <nz-form-label>Đến ngày</nz-form-label>
                                <nz-form-control>
                                    <input type="date" class="ant-input"
                                        style="width: 100%; font-size: 12px; height: 30px;"
                                        [(ngModel)]="filters.dateEnd" name="modalEndDate" />
                                </nz-form-control>
                            </nz-form-item>
                        </div>

                        <div nz-col [nzSpan]="24">
                            <nz-form-item style="margin-bottom: 12px;">
                                <nz-form-label>Nhân viên</nz-form-label>
                                <nz-form-control>
                                    <nz-select name="modalEmployeeId" nzShowSearch nzAllowClear nzSize="small"
                                        nzPlaceHolder="Chọn nhân viên" [(ngModel)]="filters.employeeId"
                                        nzDropdownClassName="select-dropdown" [nzDisabled]="isEmployeeIdDisabled"
                                        style="width: 100%;">
                                        <nz-option *ngFor="let item of employees" [nzValue]="item.ID"
                                            [nzLabel]="item.Code + ' - ' + item.FullName"></nz-option>
                                    </nz-select>
                                </nz-form-control>
                            </nz-form-item>
                        </div>

                        <div nz-col [nzSpan]="24">
                            <nz-form-item style="margin-bottom: 12px;">
                                <nz-form-label>Từ khóa</nz-form-label>
                                <nz-form-control>
                                    <nz-input-group nzSearch nzSize="small" style="width: 100%;">
                                        <input type="text" nz-input placeholder="Nhập từ khóa"
                                            [(ngModel)]="filterTextSearch" name="modalFilterText"
                                            (keyup.enter)="searchData(); isShowModal = false" />
                                    </nz-input-group>
                                </nz-form-control>
                            </nz-form-item>
                        </div>
                    </div>
                </form>
            </ng-container>
        </nz-modal>

        <!-- Content -->
        <div class="card-body p-0 flex-grow-1" style="min-height: 0;">
            <div class="card h-100 border-0 rounded-0 d-flex flex-column">
                <div class="card-body p-0 flex-grow-1 grid-container-daily-report-acc" style="overflow: hidden;">
                    <nz-spin [nzSpinning]="isLoadingData" nzTip="Đang tải dữ liệu..." class="h-100 w-100">
                        <angular-slickgrid gridId="gridDailyReportAcc" [columns]="columnDefinitions"
                            [options]="gridOptions" [dataset]="dataset"
                            (onAngularGridCreated)="angularGridReady($event.detail)"
                            (onClick)="onRowClick($event.detail.eventData, $event.detail.args)"
                            (onDblClick)="onRowDblClick($event.detail.eventData, $event.detail.args)">
                        </angular-slickgrid>
                    </nz-spin>
                </div>
                <div class="card-footer bg-white p-1" style="flex-shrink: 0;">
                    <div class="d-flex align-items-center justify-content-between gap-2" style="flex-wrap: wrap;">
                        <div></div>
                        <div class="d-flex align-items-center gap-1">
                            <div class="fs-12">
                                Trang <b>{{ filters.pageNumber || 1 }}</b>/<b>{{ totalPage || 1 }}</b>
                            </div>
                            <button nz-button nzType="default" nzSize="small" (click)="prevPage()"
                                [disabled]="(filters.pageNumber || 1) <= 1">
                                <nz-icon nzType="left"></nz-icon>
                            </button>
                            <button nz-button nzType="default" nzSize="small" (click)="nextPage()"
                                [disabled]="(filters.pageNumber || 1) >= (totalPage || 1)">
                                <nz-icon nzType="right"></nz-icon>
                            </button>
                            <div class="d-flex align-items-center gap-1">
                                <span class="fs-12">Số dòng</span>
                                <nz-input-number *ngIf="isMobile" nzSize="small" style="width: 70px;"
                                    [ngModel]="filters.pageSize" [nzMin]="1" (ngModelChange)="onPageSizeChange($event)">
                                </nz-input-number>
                                <nz-select *ngIf="!isMobile" style="width: 80px;" nzSize="small"
                                    [ngModel]="filters.pageSize" (ngModelChange)="onPageSizeChange($event)">
                                    <nz-option *ngFor="let s of pageSizeOptions" [nzValue]="s"
                                        [nzLabel]="s"></nz-option>
                                </nz-select>
                            </div>
                            <div class="d-flex align-items-center gap-1">
                                <span class="fs-12">Đi tới</span>
                                <nz-input-number nzSize="small" style="width: 50px;" [nzMin]="1"
                                    [nzMax]="totalPage || 1" [ngModel]="filters.pageNumber || 1"
                                    (ngModelChange)="goToPage($event)">
                                </nz-input-number>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ng-container>
