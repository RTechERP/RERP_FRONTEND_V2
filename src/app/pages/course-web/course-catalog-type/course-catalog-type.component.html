<ng-container class="w-100">
    <nz-splitter>
        <nz-splitter-panel nzDefaultSize="100%">
            <div class="card h-100 border-0 rounded-0">
                <div class="card-header bg-white p-1 d-flex align-items-center justify-content-between">
                    <div class="d-flex gap-1">
                        <button nz-button nzSize="small" class="fs-12 button button-succes btn-add" (click)="addCourseCatalogType()" *hasPermission="'N96'">
              <img src="assets/icon/action_add_item_16.png" alt="Thêm mới " /> Thêm
            </button>

                        <button class="fs-12 btn-edit" nz-button nzType="default" nzSize="small" (click)="editCourseCatalogType()" *hasPermission="'N96'">
              <img src="assets/icon/action_edit_item_16.png" alt="Sửa">Sửa
            </button>
                        <button class="fs-12 btn-delete" nz-button nzType="default" nzSize="small" nzDanger *hasPermission="'N96'" (click)="deleteCourseCatalogType()">
              <img src="assets/icon/action_delete_item_16.png" alt="Xóa " />Xóa
            </button>
                    </div>
                    <div class="d-flex gap-1 align-items-center">
                        <input nz-input nzSize="small" placeholder="Nhập từ khóa" style="width: 250px" [(ngModel)]="keyword" (keyup.enter)="onsearchData()" />
                        <button nz-button nzType="default" nzSize="small" (click)="onsearchData()" class="btn">
              <nz-icon nzType="search" />
            </button>
                    </div>
                </div>
                <div class="card-body p-0 h-100">
                    <div class="border" #tb_courseType></div>
                </div>
            </div>
        </nz-splitter-panel>
    </nz-splitter>
</ng-container>
