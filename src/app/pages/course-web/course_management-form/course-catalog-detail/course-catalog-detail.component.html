<div class="modal-header bg-primary p-2">
    <h6 class="modal-title text-white  text-uppercase" id="courseCatalogModalLabel">Danh mục khóa học</h6>
    <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
</div>
<div class="modal-body">
    <form nz-form [formGroup]="formGroup" nzLayout="vertical" class="fs-7 mt-2">
        <nz-row [nzGutter]="24">
            <nz-col [nzSpan]="12">
                <nz-form-item>
                    <nz-form-label for="codeInput" class="fs-12 p-0">Mã danh mục<span class="text-danger ps-1">(*)
            </span></nz-form-label>
                    <nz-form-control [nzSpan]="24" [nzErrorTip]="
              formGroup.get('Code')?.hasError('required') &&
              (formGroup.get('Code')?.dirty || formGroup.get('Code')?.touched)
                ? 'Vui lòng nhập mã danh mục!'
                : formGroup.get('Code')?.hasError('maxlength')
                ? 'Mã danh mục tối đa 100 ký tự!'
                : undefined
            ">
                        <input id="codeInput" nz-input name="Code" placeholder="Nhập mã danh mục" formControlName="Code" />
                    </nz-form-control>
                </nz-form-item>
            </nz-col>
            <nz-col [nzSpan]="6">
                <nz-form-item>
                    <nz-form-label for="sttInput" class="fs-12 p-0">STT</nz-form-label>
                    <nz-form-control [nzSpan]="24">
                        <input id="sttInput" nz-input name="STT" placeholder="STT" formControlName="STT" readonly />
                    </nz-form-control>
                </nz-form-item>
            </nz-col>
            <nz-col [nzSpan]="6">
                <nz-form-item>
                    <nz-form-label class="fs-12 p-0" [style.visibility]="'hidden'">.</nz-form-label>
                    <nz-form-control [nzSpan]="24">
                        <label nz-checkbox formControlName="IsDeleteFlag"> Hoạt động</label>
                    </nz-form-control>
                </nz-form-item>
            </nz-col>
        </nz-row>

        <nz-form-item>
            <nz-form-label for="nameInput" class="fs-12 p-0">Tên danh mục<span class="text-danger ps-1">(*)
        </span></nz-form-label>
            <nz-form-control [nzSpan]="24" [nzErrorTip]="
          formGroup.get('Name')?.hasError('required') &&
          (formGroup.get('Name')?.dirty || formGroup.get('Name')?.touched)
            ? 'Vui lòng nhập tên danh mục!'
            : formGroup.get('Name')?.hasError('maxlength')
            ? 'Tên danh mục tối đa 200 ký tự!'
            : undefined
        ">
                <input id="nameInput" nz-input name="Name" placeholder="Nhập tên danh mục" formControlName="Name" />
            </nz-form-control>
        </nz-form-item>

        <nz-form-item>
            <nz-form-label for="catalogTypeSelect" class="fs-12 p-0">Loại danh mục khóa học<span class="text-danger ps-1">(*)</span></nz-form-label>
            <nz-form-control [nzSpan]="24" [nzErrorTip]="
              formGroup.get('CatalogType')?.hasError('required') &&
              (formGroup.get('CatalogType')?.dirty || formGroup.get('CatalogType')?.touched)
                ? 'Vui lòng chọn loại danh mục khóa học!'
                : undefined
            ">
                <nz-row [nzGutter]="8">
                    <nz-col [nzSpan]="22">
                        <nz-select
                            id="catalogTypeSelect"
                            formControlName="CatalogType"
                            nzPlaceHolder="Chọn loại danh mục khóa học"
                            style="width: 100%;">
                            <nz-option
                                *ngFor="let item of courseCatalogTypeData"
                                [nzValue]="item.ID"
                                [nzLabel]="item.CourseCatalogTypeCode + ' - ' + item.CourseCatalogTypeName">
                            </nz-option>
                        </nz-select>
                    </nz-col>
                    <nz-col [nzSpan]="2">
                        <button nz-button nzType="primary" nzSize="small"
                                (click)="onAddCatalogType()"
                                class="quick-add-btn"
                                title="Thêm loại danh mục mới">
                            <nz-icon nzType="plus" nzTheme="outline"></nz-icon>
                        </button>
                    </nz-col>
                </nz-row>
            </nz-form-control>
        </nz-form-item>


        <div class="modal-footer">
            <button nz-button nzDanger nzType="default" (click)="close()" [disabled]="saving">
        Đóng
      </button>
            <button nz-button nzType="primary" (click)="saveCourseCatalog()" [disabled]="saving">
        <i *ngIf="saving" nz-icon nzType="loading" class="me-2"></i>
        {{ saving ? 'Đang lưu...' : 'Lưu' }}
      </button>
        </div>
    </form>
</div>
