<ng-container class="w-100">
    <nz-splitter>
        <nz-splitter-panel nzDefaultSize="100%">
            <div class="card h-100 border-0 rounded-0">
                <div class="card-header bg-white p-1">
                    <div class="d-flex gap-2 align-items-center flex-wrap justify-content-between">
                        <button class="fs-12" nz-button nzType="default" nzSize="small" (click)="exportToExcel()">
              <img src="assets/icon/action_export_excel_16.png" alt="Xuất Excel" class="me-1" />Xuất excel
            </button>
                        <div class="d-flex gap-2 align-items-center flex-wrap">
                            <nz-form-item class="mb-0">
                                <nz-form-control>
                                    <label class="me-1 fs-12">Người dùng:</label>
                                    <nz-select name="employeeId" style="width: 500px;" nzShowSearch nzAllowClear nzPlaceHolder="Chọn người dùng" [(ngModel)]="employeeId" nzSize="small" class="fs-12">
                                        @for (item of employees; track $index) {
                                        <nz-option nzCustomContent="true" [nzLabel]="item.FullName" [nzValue]="item.EmployeeID">{{ item.Email + " - " + item.FullName }}
                                        </nz-option>
                                        }
                                    </nz-select>
                                </nz-form-control>
                            </nz-form-item>
                            <button nz-button nzType="primary" nzSize="small" (click)="searchData()">Tìm kiếm</button>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <nz-splitter [nzLayout]="splitterLayout">
                        <nz-splitter-panel nzDefaultSize="20%" nzMin="5%" nzMax="50%">
                            <div class="box">
                                <ng-container class="w-100">
                                    <nz-splitter>
                                        <nz-splitter-panel nzDefaultSize="100%">
                                            <div class="card h-100 border-0 rounded-0">
                                                <div class="card-header bg-white p-1">
                                                    <div class="d-flex gap-1">
                                                        <span class="fw-bold">Danh sách người dùng</span>
                                                    </div>
                                                </div>
                                                <div class="card-body p-0">
                                                    <div #EmployeeTable style="width: 100%; height: 100%"></div>
                                                </div>
                                            </div>
                                        </nz-splitter-panel>
                                    </nz-splitter>
                                </ng-container>
                            </div>
                        </nz-splitter-panel>

                        <nz-splitter-panel nzDefaultSize="80%" nzMin="50%" nzMax="95%">
                            <div class="box">
                                <ng-container class="w-100">
                                    <nz-splitter>
                                        <nz-splitter-panel nzDefaultSize="100%">
                                            <div class="card h-100 border-0 rounded-0">
                                                <div class="card-header bg-white p-1">
                                                    <div class="d-flex gap-1">
                                                        <span class="fw-bold">Kết quả thi</span>
                                                    </div>
                                                </div>
                                                <div class="card-body p-0">
                                                    <div #ExamResultsTable style="width: 100%; height: 100%"></div>
                                                </div>
                                            </div>
                                        </nz-splitter-panel>
                                    </nz-splitter>
                                </ng-container>
                            </div>
                        </nz-splitter-panel>
                    </nz-splitter>
                </div>
            </div>
        </nz-splitter-panel>
    </nz-splitter>
</ng-container>
