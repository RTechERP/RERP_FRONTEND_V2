<nz-spin [nzSpinning]="loading">
  <div class="p-3">
    <div class="mb-3">
      <strong>Lần đăng ký/gia hạn/bàn giao thứ:</strong> <span [class.text-danger]="detailCount > 3">{{ detailCount }} / 3</span>
    </div>


    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div nz-row [nzGutter]="16">
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired>Loại</nz-form-label>
            <nz-form-control>
              <nz-radio-group formControlName="Type">
                <label nz-radio [nzValue]="2">Gia hạn</label>
                <label nz-radio [nzValue]="3">Bàn giao</label>
              </nz-radio-group>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-row [nzGutter]="16">
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Ngày bắt đầu (Ngày KT cũ)</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn ngày!">
              <nz-date-picker formControlName="StartDate" nzFormat="dd/MM/yyyy" style="width: 100%"></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Ngày kết thúc sau gia hạn</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn ngày!">
              <nz-date-picker formControlName="EndDate" nzFormat="dd/MM/yyyy" style="width: 100%" nzDisabled></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-row [nzGutter]="16">
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Người sử dụng</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn người sử dụng!">
              <nz-select formControlName="OwnerID" nzShowSearch nzAllowClear nzPlaceHolder="Chọn nhân viên">
                <nz-option *ngFor="let e of employees" [nzValue]="e.ID" [nzLabel]="e.FullName"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzRequired>Người duyệt</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn người duyệt!">
              <nz-select formControlName="ApproverID" nzShowSearch nzAllowClear nzPlaceHolder="Chọn người duyệt">
                <nz-option *ngFor="let a of approvers" [nzValue]="a.ID" [nzLabel]="a.FullName"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>

    <div class="text-end mt-3">
      <button nz-button nzType="default" (click)="onCancel()" class="me-2">Hủy</button>
      <button nz-button nzType="primary" (click)="onSave()" [disabled]="detailCount > 3" [nzLoading]="loading">Xác nhận</button>
    </div>
  </div>
</nz-spin>
