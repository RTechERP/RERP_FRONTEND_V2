<p-menubar [model]="menuBars">
    <ng-template pTemplate="item" let-item>
        <a class="p-menuitem-link" [ngClass]="item.styleClass">
            <i [class]="item.icon"></i>
            <span class="p-menuitem-text">{{ item.label }}</span>
        </a>
    </ng-template>
</p-menubar>
<ng-container class="w-100">
    <div class="card border-0 rounded-0 shadow-sm overflow-hidden mt-2">
        <div class="card-body p-0" style="position: relative;">
            <div *ngIf="isLoading" style="position: absolute; top:0; left:0; width:100%; height:100%;
               background: rgba(255,255,255,0.4); z-index: 999; display: flex; align-items: center; justify-content: center;">
              <nz-spin nzSimple></nz-spin>
            </div>
            <app-custom-table 
                [data]="tableData" 
                [textWrap]="false" 
                [columns]="columns" 
                [loading]="isLoading"
                dataKey="ID" 
                [scrollable]="true" 
                scrollHeight="flex" 
                [showGlobalFilter]="false" 
                [paginator]="false"
                fontSize="13px" 
                [clickSelectRow]="true"
                (rowClick)="selectedRow = $event">
            </app-custom-table>
        </div>
    </div>
</ng-container>
