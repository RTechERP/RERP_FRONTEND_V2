<div class="modal-header">
    <h4 class="modal-title">{{ data.ID ? 'Sửa ngân hàng' : 'Thêm ngân hàng' }}</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="handleCancel()"></button>
</div>
<div class="modal-body">
    <form nz-form [formGroup]="validateForm" nzLayout="vertical">
        <div nz-row [nzGutter]="24">
            <div nz-col [nzSpan]="4">
                <nz-form-item>
                    <nz-form-label>STT</nz-form-label>
                    <nz-form-control>
                        <nz-input-number formControlName="STT" [nzMin]="0" [nzStep]="1"
                            style="width: 100%"></nz-input-number>
                    </nz-form-control>
                </nz-form-item>
            </div>
            <div nz-col [nzSpan]="20">
                <nz-form-item>
                    <nz-form-label nzRequired>Tên ngân hàng</nz-form-label>
                    <nz-form-control nzErrorTip="Vui lòng nhập tên ngân hàng">
                        <input nz-input formControlName="BankName" placeholder="Nhập tên ngân hàng" />
                    </nz-form-control>
                </nz-form-item>
            </div>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button nz-button nzType="default" (click)="handleCancel()">Hủy</button>
    <button nz-button nzType="primary" (click)="handleOk()" [nzLoading]="isSubmit">Lưu</button>
</div>
