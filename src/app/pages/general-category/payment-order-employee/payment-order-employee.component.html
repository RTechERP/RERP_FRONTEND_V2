    <p-menubar [model]="menuBars">
        <ng-template pTemplate="item" let-item>
            <a class="p-menuitem-link" [ngClass]="item.styleClass">
                <i [class]="item.icon"></i>
                <span class="p-menuitem-text">{{ item.label }}</span>
            </a>
        </ng-template>
        <ng-template #end>
            <div class="flex items-center gap-2">
                <button nz-button nzType="text" (click)="isAdvandShow = !isAdvandShow"
                    [title]="isAdvandShow ? 'Ẩn bộ lọc' : 'Hiện bộ lọc'">
                    <i [class]="
              isAdvandShow ? 'fa-solid fa-chevron-up' : 'fa-solid fa-filter'
            "></i>
                </button>
                <button nz-button nzType="text" *ngIf="isMobile" (click)="isShowModal = true; $event.stopPropagation()"
                    title="Tìm kiếm">
                    <i class="fa-solid fa-filter"></i>
                </button>
            </div>
        </ng-template>
    </p-menubar>

    <div class="filter-bar animate-fade-in" *ngIf="isAdvandShow">
        <div class="filter-item">
            <label>Từ ngày</label>
            <nz-date-picker [(ngModel)]="param.dateStart" nzFormat="dd/MM/yyyy" nzSize="small"
                class="w-100"></nz-date-picker>
        </div>
        <div class="filter-item">
            <label>Đến ngày</label>
            <nz-date-picker [(ngModel)]="param.dateEnd" nzFormat="dd/MM/yyyy" nzSize="small"
                class="w-100"></nz-date-picker>
        </div>
        <div class="filter-item">
            <label>Tình trạng</label>
            <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Chọn" [(ngModel)]="param.step" nzSize="small"
                class="w-100">
                @for (item of steps; track item) {
                <nz-option [nzLabel]="item.text" [nzValue]="item.value"></nz-option>
                }
            </nz-select>
        </div>
        <div class="filter-item">
            <label>Trạng thái</label>
            <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Chọn" [(ngModel)]="param.isApproved" nzSize="small"
                class="w-100">
                @for (item of isApproveds; track item) {
                <nz-option [nzLabel]="item.text" [nzValue]="item.value"></nz-option>
                }
            </nz-select>
        </div>
        <div class="filter-item">
            <label>Loại</label>
            <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Chọn" [(ngModel)]="param.typeOrder" nzSize="small"
                class="w-100">
                @for (item of typeOrders; track item) {
                <nz-option [nzLabel]="item.text" [nzValue]="item.value"></nz-option>
                }
            </nz-select>
        </div>
        <div class="filter-item">
            <label>Nội dung</label>
            <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Chọn" [(ngModel)]="param.paymentOrderTypeID"
                nzSize="small" class="w-100">
                @for (item of paymentOrderTypes; track item) {
                <nz-option [nzLabel]="item.TypeName" [nzValue]="item.ID"></nz-option>
                }
            </nz-select>
        </div>
        <div class="filter-item">
            <label>Từ khóa</label>
            <nz-input-group [nzSuffix]="suffixIconSearch" nzSize="small">
                <input type="text" nz-input placeholder="Tìm kiếm từ khóa..." [(ngModel)]="param.keyword"
                    (keyup.enter)="loadData()" />
            </nz-input-group>
            <ng-template #suffixIconSearch>
                <span nz-icon nzType="search" (click)="loadData()" class="cursor-pointer text-gray-400"></span>
            </ng-template>
        </div>
    </div>
</header>

<main class="flex-1 overflow-hidden">
    <nz-splitter nzLayout="vertical" style="height: 100% !important">
        <!-- Top Panel: Main Tables -->
        <nz-splitter-panel nzMin="20%" [nzDefaultSize]="'60%'">
            <div class="tabs-container panel-shadow">
                <p-tabs [(value)]="activeTab" (valueChange)="tabValueChange($event)">
                    <p-tablist>
                        <p-tab value="0">ĐỀ NGHỊ THANH TOÁN</p-tab>
                        <p-tab value="1">ĐỀ NGHỊ THANH TOÁN ĐẶC BIỆT</p-tab>
                    </p-tablist>
                    <p-tabpanels>
                        <p-tabpanel value="0">
                            <div class="grid-wrapper" *ngIf="activeTab === '0'">
                                <app-custom-table [columns]="columnDefs" [headerGroups]="headerGroups" [data]="dataset"
                                    [loading]="isLoading" [selectionMode]="'single'" [scrollable]="true"
                                    [scrollHeight]="'flex'" [virtualScroll]="true" [virtualScrollItemSize]="34"
                                    [textWrap]="true" [resizable]="true" [resizeMode]="'expand'" [minWidth]="'5500px'"
                                    (selectionChange)="onRowSelect($event)" (rowDblClick)="onPrint($event)" dataKey="ID"
                                    [showFooter]="true" [contextMenuItems]="contextMenu"></app-custom-table>
                            </div>
                        </p-tabpanel>
                        <p-tabpanel value="1">
                            <div class="grid-wrapper" *ngIf="activeTab === '1'">
                                <app-custom-table [columns]="columnDefsSpecial" [data]="datasetSpecial"
                                    [loading]="isLoading" [selectionMode]="'single'" [scrollable]="true"
                                    [scrollHeight]="'flex'" [virtualScroll]="true" [virtualScrollItemSize]="34"
                                    [textWrap]="true" [resizable]="true" [resizeMode]="'expand'" [minWidth]="'2500px'"
                                    (selectionChange)="onRowSelect($event)" (rowDblClick)="onPrint($event)" dataKey="ID"
                                    [showFooter]="true" [contextMenuItems]="contextMenu"></app-custom-table>
                            </div>
                        </p-tabpanel>
                    </p-tabpanels>
                </p-tabs>
            </div>
        </nz-splitter-panel>

        <!-- Bottom Panel: Details & Files -->
        <nz-splitter-panel style="display: flex; flex-direction: column">
            <nz-splitter nzLayout="horizontal" style="height: 100%">
                <!-- Details Table -->
                <nz-splitter-panel [nzDefaultSize]="'65%'" style="display: flex; flex-direction: column">
                    <div class="grid-wrapper panel-shadow">
                        <app-custom-table [columns]="
                activeTab === '0' ? columnDefDetails : columnDefDetailsSpecial
              " [data]="activeTab === '0' ? datasetDetails : datasetSpecialDetail" [scrollable]="true"
                            [scrollHeight]="'flex'" [virtualScroll]="true" [virtualScrollItemSize]="34" dataKey="ID"
                            [textWrap]="true" [resizeMode]="'expand'" [minWidth]="'80rem'"
                            [loading]="isLoadingDetail"></app-custom-table>
                    </div>
                </nz-splitter-panel>

                <!-- Files Tabs -->
                <nz-splitter-panel style="display: flex; flex-direction: column">
                    <div class="tabs-container panel-shadow">
                        <p-tabs [(value)]="activeFileTab">
                            <p-tablist>
                                <p-tab value="0">File đính kèm</p-tab>
                                <p-tab value="1">File bankslip</p-tab>
                            </p-tablist>
                            <p-tabpanels>
                                <p-tabpanel value="0">
                                    <div class="grid-wrapper" *ngIf="activeFileTab === '0'">
                                        <app-custom-table [columns]="columnDefFiles" [data]="datasetFiles"
                                            [scrollable]="true" [scrollHeight]="'flex'" [virtualScroll]="true"
                                            [virtualScrollItemSize]="34" [contextMenuItems]="fileContextItems"
                                            (cellAction)="onCellActionFile($event)"
                                            [(selectedContextRow)]="selectedRowFile"
                                            (selectionChange)="onRowSelectFile($event)" dataKey="ID"
                                            [loading]="isLoadingDetail"></app-custom-table>
                                    </div>
                                </p-tabpanel>
                                <p-tabpanel value="1">
                                    <div class="grid-wrapper" *ngIf="activeFileTab === '1'">
                                        <app-custom-table [columns]="columnDefFiles" [data]="datasetFileBankslip"
                                            [scrollable]="true" [scrollHeight]="'flex'" [virtualScroll]="true"
                                            [virtualScrollItemSize]="34" [contextMenuItems]="fileContextItems"
                                            (cellAction)="onCellActionFile($event)"
                                            [(selectedContextRow)]="selectedRowFile"
                                            (selectionChange)="onRowSelectFile($event)" dataKey="ID"
                                            [loading]="isLoadingDetail"></app-custom-table>
                                    </div>
                                </p-tabpanel>
                            </p-tabpanels>
                        </p-tabs>
                    </div>
                </nz-splitter-panel>
            </nz-splitter>
        </nz-splitter-panel>
    </nz-splitter>
</main>
