<p-menubar [model]="menuItems">
  <ng-template pTemplate="start">
    <div class="page-title ms-2 me-3">
      <span nz-icon nzType="file-done" nzTheme="outline" class="me-2"></span>
      Phê Duyệt Đánh Giá Hợp Đồng (HR)
    </div>
  </ng-template>

  <div class="filter-bar bg-light border-bottom p-2 w-100">
    <form nz-form>
      <div class="filter-bar-inner">
        <div class="filter-right">
          <!-- Từ ngày -->
          <nz-form-item class="m-0 d-flex align-items-center gap-1 flex-shrink-0">
            <nz-form-label style="font-size: 12px; margin: 0; white-space: nowrap;">Từ ngày</nz-form-label>
            <nz-form-control>
              <input type="date" [(ngModel)]="dateStart" name="dateStart"
                title="Từ ngày"
                style="width: 125px; font-size: 12px; height: 24px; border: 1px solid #d9d9d9; border-radius: 2px; padding: 0 8px;" />
            </nz-form-control>
          </nz-form-item>

          <!-- Đến ngày -->
          <nz-form-item class="m-0 d-flex align-items-center gap-1 flex-shrink-0">
            <nz-form-label style="font-size: 12px; margin: 0; white-space: nowrap;">Đến ngày</nz-form-label>
            <nz-form-control>
              <input type="date" [(ngModel)]="dateEnd" name="dateEnd"
                title="Đến ngày"
                style="width: 125px; font-size: 12px; height: 24px; border: 1px solid #d9d9d9; border-radius: 2px; padding: 0 8px;" />
            </nz-form-control>
          </nz-form-item>

          <!-- Từ khóa -->
          <nz-form-item class="m-0 d-flex align-items-center gap-1 flex-shrink-0">
            <nz-form-label style="font-size: 12px; margin: 0; white-space: nowrap;">Từ khóa</nz-form-label>
            <nz-form-control>
              <input nz-input placeholder="Nhập từ khóa" nzSize="small" [(ngModel)]="keyword" name="keyword"
                style="width: 120px; font-size: 12px;" (keyup.enter)="onSearch()" />
            </nz-form-control>
          </nz-form-item>

          <!-- Nút tìm kiếm + filter nâng cao -->
          <div class="btn-group flex-shrink-0">
            <button nz-button nzType="primary" [disabled]="!dateStart || !dateEnd"
            [class.btn-disabled]="!dateStart || !dateEnd" nzSize="small" (click)="onSearch()">
              Tìm kiếm
            </button>
            <button nz-button nzType="primary" nzSize="small" nz-dropdown [nzDropdownMenu]="searchMenu" nzTrigger="click"
              nzPlacement="bottomRight" style="padding-left: 8px; padding-right: 8px">
              <i nz-icon nzType="down"></i>
            </button>
            <nz-dropdown-menu #searchMenu="nzDropdownMenu">
              <div class="p-3 advanced-filters-container" style="
                min-width: 300px;
                background-color: #ffffff;
                border: 1px solid #d9d9d9;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
              ">
                <ng-container *ngTemplateOutlet="advancedFiltersTemplate"></ng-container>
              </div>
            </nz-dropdown-menu>
          </div>
        </div>
      </div>
    </form>
  </div>
</p-menubar>



<div class="table-wrapper position-relative" style="width: 100%; border-top: 1px solid #ddd; background: #fff;"
  [style.height]="selectedRow ? 'calc(100vh - 78px)' : 'calc(100vh - 55px)'">
  <div *ngIf="isLoading" style="position: absolute; top:0; left:0; width:100%; height:100%;
     background: rgba(255,255,255,0.4); z-index: 999; display: flex; align-items: center; justify-content: center;">
    <nz-spin nzSimple></nz-spin>
  </div>

  <app-custom-table [data]="tableData" [textWrap]="true" [columns]="columns" [loading]="isLoading" dataKey="ID"
    [scrollable]="true" scrollHeight="flex" [showGlobalFilter]="false" [paginator]="false" [rows]="20"
    rowGroupMode="subheader" groupRowsBy="DepartmentName" [expandableRowGroups]="true"
    [rowsPerPageOptions]="[20, 50, 100]" fontSize="12px" [clickSelectRow]="true"
    (onRowDoubleClick)="onRowDoubleClick($event)"
    (rowClick)="onRowClickToggleSelection($event)" selectionMode="multiple" [(selection)]="selectedRequests">
  </app-custom-table>
</div>

<ng-template #advancedFiltersTemplate>
  <div style="background-color: #ffffff; padding: 0">
    <form nz-form nzLayout="vertical" class="mt-1">
      <nz-form-item>
        <nz-form-label class="fs-12">Trạng thái</nz-form-label>
        <nz-form-control>
          <nz-select [(ngModel)]="step" name="step" nzPlaceHolder="-- Tất cả --" nzAllowClear nzShowSearch>
            <nz-option [nzValue]="-1"></nz-option>
            <nz-option *ngFor="let s of stepOptions" [nzValue]="s.value" [nzLabel]="s.label"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <!-- Phòng ban -->
      <nz-form-item class="mt-2">
        <nz-form-label class="fs-12">Phòng ban</nz-form-label>
        <nz-form-control>
          <nz-select name="departmentId" [(ngModel)]="departmentId" class="w-100" nzShowSearch nzAllowClear
            nzPlaceHolder="Tất cả phòng ban" [nzDisabled]="isEmployee || isTBP">
            <nz-option *ngFor="let dept of departmentList" [nzValue]="dept.ID" [nzLabel]="dept.Name">
              <span style="white-space: normal; word-break: break-word; display: block;">
                {{ dept.Name }}
              </span>
            </nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item class="mt-2">
        <nz-form-label class="fs-12">Nhân viên</nz-form-label>
        <nz-form-control>
          <nz-select name="employeeRequestId" [(ngModel)]="employeeRequestId" class="w-100" nzShowSearch nzAllowClear
            nzPlaceHolder="--Chọn nhân viên--" [nzDisabled]="isEmployee">
            <ng-container *ngFor="let group of employees">
              <nz-option-group [nzLabel]="group.label">
                <nz-option *ngFor="let option of group.options"
                  [nzLabel]="option.item.Code + ' - ' + option.item.FullName" [nzValue]="option.item.EmployeeID"
                  nzCustomContent>
                  <span style="
                      white-space: normal;
                      word-break: break-word;
                      display: block;
                    ">
                    {{ option.item.Code }} - {{ option.item.FullName }}
                  </span>
                </nz-option>
              </nz-option-group>
            </ng-container>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>
</ng-template>
