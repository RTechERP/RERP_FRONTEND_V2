<nz-row [nzGutter]="16" class="fs-12" style="height: calc(100vh - 60px);">
  <!-- Master Grid - Left -->
  <nz-col [nzSpan]="14">
    <div class="master-section h-100 mt-2">
      <div class="card h-100 border-0 rounded-0 shadow-sm">
        <div class="card-header bg-white p-2">
          <div class="d-flex gap-1 align-items-center justify-content-between">
            <span class="fw-bold text-uppercase" style="color: #1890ff;">DANH SÁCH PHÒNG BAN <span style="color:#d00;"
                class="text-lowercase ms-1">({{ departments.length }} phòng ban)</span></span>
            <div class="d-flex gap-2">
              <button class="fs-12 btn-add" nz-button nzType="default" nzSize="small" (click)="openAddModal()"
                *hasPermission="'N1,N2'">
                <img src="assets/icon/action_add_item_16.png" alt="Thêm " /> Thêm
              </button>
              <button class="fs-12 btn-edit" nz-button nzType="default" nzSize="small" (click)="openEditModal()"
                *hasPermission="'N1,N2'">
                <img src="assets/icon/action_edit_item_16.png" alt="Sửa" />Sửa
              </button>
              <button class="fs-12 btn-delete" nz-button nzType="default" nzSize="small" (click)="openDeleteModal()"
                *hasPermission="'N1,N2'">
                <img src="assets/icon/action_delete_item_16.png" alt="Xóa " />Xóa
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-0 position-relative" style="height: calc(100vh - 110px);">
          <div *ngIf="isLoading">
            <nz-spin [nzSpinning]="isLoading" nzSimple [style]="{
              position: 'absolute',
              top: '0',
              left: '0',
              width: '100%',
              height: '100%',
              background: 'rgba(255,255,255,0.4)',
              zIndex: '999',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center'
            }"></nz-spin>
          </div>
          <div id="tb_department"></div>
        </div>
      </div>
    </div>
  </nz-col>

  <!-- Detail Grid - Right -->
  <nz-col [nzSpan]="10">
    <div class="detail-section h-100 mt-2">
      <div class="card h-100 border-0 rounded-0 shadow-sm">
        <div class="card-header bg-white p-2 d-flex justify-content-between align-items-center">
          <div>
            <span class="fw-bold text-uppercase" style="color: #52c41a;">THÀNH VIÊN PHÒNG BAN <span
                *ngIf="employeeListByDept.length > 0" style="color:#d00;" class="text-lowercase ms-1">({{
                employeeListByDept.length }} nhân viên)</span></span>
            <span *ngIf="selectedDepartment" class="badge bg-primary ms-2 fs-12">{{ selectedDepartment.Name }}</span>
          </div>
          <div class="d-flex gap-2">
            <button class="fs-12 btn-add" nz-button nzType="default" nzSize="small" (click)="addMember()"
              [disabled]="!selectedDepartment" *hasPermission="'N1,N2'">
              <i class="fa-solid fa-user-plus text-success me-1"></i> Thêm thành viên
            </button>
            <button class="fs-12 btn-delete" nz-button nzType="default" nzSize="small" (click)="removeMember()"
              [disabled]="!selectedEmployee" *hasPermission="'N1,N2'">
              <i class="fa-solid fa-user-minus text-danger me-1"></i> Xóa thành viên
            </button>
          </div>
        </div>
        <div class="card-body p-0 position-relative" style="height: calc(100vh - 110px);">
          <div *ngIf="isLoadingEmployee">
            <nz-spin [nzSpinning]="isLoadingEmployee" nzSimple [style]="{
              position: 'absolute',
              top: '0',
              left: '0',
              width: '100%',
              height: '100%',
              background: 'rgba(255,255,255,0.4)',
              zIndex: '999',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center'
            }"></nz-spin>
          </div>
          <div id="tb_employee"></div>
        </div>
      </div>
    </div>
  </nz-col>
</nz-row>

<nz-modal [(nzVisible)]="isVisible" [nzTitle]="isEditMode ? 'SỬA PHÒNG BAN' : 'THÊM PHÒNG BAN MỚI'"
  (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()" [nzOkText]="'Lưu'" [nzCancelText]="'Đóng'"
  [nzOkLoading]="isSubmitting">
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="departmentForm" (ngSubmit)="onSubmit()">
      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Số thứ tự <span class="text-danger ps-1"> *</span></nz-form-label>
        <nz-form-control [nzSpan]="24">
          <input nz-input type="number" formControlName="STT" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Mã phòng ban<span class="text-danger ps-1"> *</span></nz-form-label>
        <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng nhập mã phòng ban">
          <input nz-input formControlName="Code" placeholder="Nhập mã phòng ban" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Tên phòng ban <span class="text-danger ps-1"> *</span></nz-form-label>
        <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng nhập tên phòng ban">
          <input nz-input formControlName="Name" placeholder="Nhập tên phòng ban" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Trưởng phòng <span class="text-danger ps-1"> *</span></nz-form-label>
        <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng chọn trưởng phòng">
          <nz-select formControlName="HeadofDepartment" nzPlaceHolder="Chọn trưởng phòng" class="w-100" nzShowSearch
            nzAllowClear nzPlaceHolder="--Chọn trưởng phòng--">
            <ng-container *ngFor="let group of employeeList">
              <nz-option-group [nzLabel]="group.label">
                <nz-option *ngFor="let option of group.options"
                  [nzLabel]="option.item.Code +' - '+ option.item.FullName" [nzValue]="option.item.EmployeeID">
                </nz-option>
              </nz-option-group>
            </ng-container>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Email</nz-form-label>
        <nz-form-control [nzSpan]="24">
          <input nz-input type="email" maxlength="100" formControlName="Email" placeholder="Nhập email" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item class="mb-1">
        <nz-form-label [nzSpan]="24">Trạng thái</nz-form-label>
        <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng chọn trạng thái">
          <nz-select class="w-100" nzShowSearch nzSize="default" formControlName="Status">
            <nz-option nzLabel="Ngừng hoạt động" [nzValue]="0"></nz-option>
            <nz-option nzLabel="Hoạt động" [nzValue]="1"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
