<ng-container class="w-100">
  <div class="card h-100 border-0 rounded-0" style="background: transparent">
    <div class="card-header bg-white p-1">
      <div class="d-flex gap-1 align-items-center">
        <p-menubar [model]="hrRecruitmentCandidateMenu" class="p-0 border-0">
        </p-menubar>
      </div>
    </div>
    <div class="filter-bar bg-light border-bottom p-2">
      <form
        nz-form
        nzLayout="inline"
        class="d-flex flex-wrap gap-2 align-items-center"
      >
        <!-- Các filter mặc định hiển thị -->
        <nz-form-item class="mb-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Từ ngày</nz-form-label
          >
          <nz-form-control>
            <input
              type="date"
              class="form-control form-control-sm date-input-sm"
              [ngModel]="dateStart | date: 'yyyy-MM-dd'"
              (ngModelChange)="onDateChange('dateStart', $event)"
              name="dateStart2"
              title="Từ ngày"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="mb-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Đến ngày</nz-form-label
          >
          <nz-form-control>
            <input
              type="date"
              class="form-control form-control-sm date-input-sm"
              [ngModel]="dateEnd | date: 'yyyy-MM-dd'"
              (ngModelChange)="onDateChange('dateEnd', $event)"
              name="dateEnd2"
              title="Đến ngày"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label class="fs-12">Trạng thái</nz-form-label>
          <nz-form-control>
            <nz-select
              [(ngModel)]="status"
              name="status"
              nzPlaceHolder="Trạng thái"
              nzSize="small"
              style="width: 180px"
              nzAllowClear
              nzShowSearch
            >
              <nz-option [nzValue]="-1" nzLabel="--Tất cả--"></nz-option>
              <nz-option [nzValue]="0" nzLabel="Ứng tuyển"></nz-option>
              <nz-option [nzValue]="1" nzLabel="Gửi thư mời"></nz-option>
              <nz-option [nzValue]="2" nzLabel="Xác nhận phỏng vấn"></nz-option>
              <nz-option [nzValue]="3" nzLabel="Đã phỏng vấn"></nz-option>
              <nz-option [nzValue]="4" nzLabel="Kết quả không đạt"></nz-option>
              <nz-option [nzValue]="5" nzLabel="Kết quả đạt"></nz-option>
              <nz-option [nzValue]="6" nzLabel="Trình phê duyệt"></nz-option>
              <nz-option
                [nzValue]="7"
                nzLabel="Gửi thư mời nhận việc"
              ></nz-option>
              <nz-option [nzValue]="8" nzLabel="Xác nhận thư mời"></nz-option>
              <nz-option [nzValue]="9" nzLabel="Nhận việc"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label class="fs-12">Vị trí</nz-form-label>
          <nz-form-control>
            <nz-select
              [(ngModel)]="employeeChucVuHDId"
              name="employeeChucVuHDId"
              nzPlaceHolder="Vị trí"
              nzSize="small"
              style="width: 300px"
              nzAllowClear
              nzShowSearch
            >
              <nz-option [nzValue]="-1" nzLabel="--Tất cả--"></nz-option>
              <nz-option
                *ngFor="let item of positionContract"
                [nzValue]="item.ID"
                [nzLabel]="item.Name"
              ></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="mb-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Từ khóa</nz-form-label
          >
          <nz-form-control>
            <input
              nz-input
              placeholder="Nhập từ khóa tìm kiếm"
              nzSize="small"
              [(ngModel)]="keyword"
              name="keyword"
              style="width: 200px; font-size: 12px"
              (keyup.enter)="onSearch()"
            />
          </nz-form-control>
        </nz-form-item>

        <!-- Nút tìm kiếm với dropdown cho filter bổ sung -->
        <nz-form-item class="mb-0">
          <nz-form-control>
            <div class="btn-group">
              <button
                nz-button
                nzType="primary"
                nzSize="small"
                (click)="onSearch()"
              >
                Tìm kiếm
              </button>
              <button
                nz-button
                nzType="primary"
                nzSize="small"
                nz-dropdown
                [nzDropdownMenu]="searchMenu"
                nzTrigger="click"
                nzPlacement="bottomRight"
                style="padding-left: 8px; padding-right: 8px"
              >
                <i nz-icon nzType="down"></i>
              </button>
              <nz-dropdown-menu #searchMenu="nzDropdownMenu">
                <div
                  class="p-3 advanced-filters-container"
                  style="
                    min-width: 300px;
                    background-color: #ffffff;
                    border: 1px solid #d9d9d9;
                    border-radius: 4px;
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                  "
                >
                  <ng-container
                    *ngTemplateOutlet="advancedFiltersTemplate"
                  ></ng-container>
                </div>
              </nz-dropdown-menu>
            </div>
          </nz-form-control>
        </nz-form-item>
      </form>
    </div>
    <div class="card-body p-0 w-100" style="height: calc(100vh - 200px)">
      <div
        *ngIf="isLoading"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(255, 255, 255, 0.4);
          z-index: 999;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <nz-spin [nzSpinning]="isLoading"></nz-spin>
      </div>
      <div class="grid-container-hr-recruitment-candidate" style="height: 100%">
        <angular-slickgrid
          [gridId]="'hrRecruitmentCandidateGrid'"
          [columns]="columnDefinitions"
          [options]="gridOptions"
          [dataset]="dataset"
          (onAngularGridCreated)="
            angularGridHrRecruitmentCandidateReady($event.detail)
          "
        >
        </angular-slickgrid>
      </div>
    </div>
  </div>
</ng-container>

<!-- Template popup ghi chú chuyển trạng thái -->
<ng-template #noteLogTpl>
  <div style="padding: 4px 0">
    <textarea
      nz-input
      [(ngModel)]="tempNoteLog"
      name="tempNoteLog"
      [nzAutosize]="{ minRows: 4, maxRows: 6 }"
      placeholder="Nhập ghi chú chuyển trạng thái..."
      style="width: 100%"
    ></textarea>
  </div>
</ng-template>

<ng-template #advancedFiltersTemplate>
  <div style="background-color: #ffffff; padding: 0">
    <form nz-form nzLayout="vertical" class="mt-1">
      <nz-form-item class="mb-0" class="mt-1">
        <nz-form-label class="fs-12" [nzSpan]="24">Phòng ban</nz-form-label>
        <nz-form-control [nzSpan]="24">
          <nz-select
            name="departmentId"
            [(ngModel)]="departmentId"
            nzPlaceHolder="Tất cả phòng ban"
            style="width: 100%"
            nzAllowClear
            nzShowSearch
          >
            <nz-option
              *ngFor="let dept of departmentList"
              [nzValue]="dept.ID"
              [nzLabel]="dept.Name"
            ></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item class="mt-2">
        <nz-form-label class="fs-12">Nhân viên</nz-form-label>
        <nz-form-control>
          <nz-select
            name="employeeRequestId"
            [(ngModel)]="employeeRequestId"
            class="w-100"
            nzShowSearch
            nzAllowClear
            nzPlaceHolder="--Chọn nhân viên--"
          >
            <ng-container *ngFor="let group of employees">
              <nz-option-group [nzLabel]="group.label">
                <nz-option
                  *ngFor="let option of group.options"
                  [nzLabel]="option.item.Code + ' - ' + option.item.FullName"
                  [nzValue]="option.item.EmployeeID"
                >
                </nz-option>
              </nz-option-group>
            </ng-container>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>
</ng-template>
