<!-- ===== Dialog chi tiết đề thi ứng tuyển ===== -->
<div class="exam-detail-form">
    <!-- ===== Tiêu đề dialog ===== -->
    <div class="modal-header bg-primary p-2">
        <h6 class="modal-title text-white text-uppercase">
            {{ isEditMode ? 'SỬA ĐỀ THI' : 'THÊM ĐỀ THI MỚI' }}
        </h6>
        <button type="button" class="btn-close me-1" aria-label="Close" (click)="onClose()"></button>
    </div>


    <!-- ===== Nội dung form ===== -->
    <div class="form-body pb-0">
        <form nz-form [formGroup]="formGroup" nzLayout="vertical">
            <!-- Tên đề thi -->
            <nz-row [nzGutter]="16">
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Tên đề thi <span class="text-danger ps-1">(*)</span></nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng nhập Tên đề thi!">
                            <input nz-input formControlName="NameExam" placeholder="Nhập tên đề thi" />
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Mã đề thi <span class="text-danger ps-1">(*)</span></nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng nhập Mã đề thi!">
                            <input nz-input formControlName="CodeExam" placeholder="" />
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
            </nz-row>

            <!-- Hàng 1: Mã đề thi + Phòng ban -->
            <nz-row [nzGutter]="16">
                <!-- Phòng ban -->
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Phòng ban <span class="text-danger ps-1">(*)</span> </nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng chọn Phòng ban!">
                            <nz-select formControlName="DepartmentID" nzPlaceHolder="-- Chọn phòng ban --" nzShowSearch
                                style="width: 100%;">
                                <nz-option *ngFor="let item of departmentOptions" [nzValue]="item.ID"
                                    [nzLabel]="item.Name">
                                </nz-option>
                            </nz-select>
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
                <!-- Hàng :Loại đề thi -->
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Loại đề thi <span class="text-danger ps-1">(*)</span></nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng chọn Loại đề thi!">
                            <nz-select formControlName="ExamType" nzPlaceHolder="-- Chọn loại --" nzShowSearch
                                style="width: 100%;">
                                <nz-option *ngFor="let item of examTypeOptions" [nzValue]="item.value"
                                    [nzLabel]="item.label">
                                </nz-option>
                            </nz-select>
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
            </nz-row>
            <!-- Hàng 3: Số điểm cần đạt + Thời gian làm bài -->
            <nz-row [nzGutter]="16">
                <!-- Số điểm cần đạt (%) -->
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Số điểm cần đạt (%) <span
                                class="text-danger ps-1">(*)</span></nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng nhập Số điểm cần đạt (1-100)!">
                            <nz-input-number formControlName="Goal" [nzMin]="1" [nzMax]="100" [nzStep]="1"
                                style="width: 100%;">
                            </nz-input-number>
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>

                <!-- Thời gian làm bài (Phút) -->
                <nz-col [nzSpan]="12">
                    <nz-form-item>
                        <nz-form-label nzRequired>Thời gian (Phút) <span
                                class="text-danger ps-1">(*)</span></nz-form-label>
                        <nz-form-control nzErrorTip="Vui lòng nhập Thời gian làm bài (> 0)!">
                            <nz-input-number formControlName="TestTime" [nzMin]="1" [nzMax]="999" [nzStep]="1"
                                style="width: 100%;">
                            </nz-input-number>
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
            </nz-row>

            <!-- Hàng 4: Hoạt động -->
            <!-- <nz-row [nzGutter]="16">
                <nz-col [nzSpan]="24">
                    <nz-form-item>
                        <nz-form-control>
                            <label nz-checkbox formControlName="IsActive">Hoạt động</label>
                        </nz-form-control>
                    </nz-form-item>
                </nz-col>
            </nz-row> -->

        </form>
    </div>

    <!-- ===== Footer: Nút hành động ===== -->
    <div class="modal-footer bg-light p-2 mt-2">
        <div class="d-flex gap-2 justify-content-end w-100">
            <button nz-button nzDanger nzType="default" (click)="onClose()" [disabled]="isSaving">
                Đóng
            </button>
            <button nz-button nzType="primary" (click)="onSaveAndNew()" [nzLoading]="isSaving">
                Lưu & Thêm mới
            </button>
            <button nz-button nzType="primary" (click)="onSaveAndClose()" [nzLoading]="isSaving">
                Lưu & Đóng
            </button>
        </div>
    </div>
</div>
