<ng-container class="w-100">
    <div class="card h-100 border-0 rounded-0" style="background: transparent">
        <div class="card-header bg-white p-1">
            <div class="d-flex gap-1 align-items-center">
                <p-menubar [model]="menuBars" class="p-0 border-0" style="width: 100%">
                    <ng-template #end>
                        <div class="d-flex gap-1 align-items-center pe-2">
                            <nz-input-group [nzSuffix]="suffixIconSearch" nzSize="small" style="width: 300px;">
                                <input type="text" nz-input placeholder="Nhập từ khóa tìm kiếm..."
                                    [(ngModel)]="filterText" (keyup.enter)="loadData()" style="font-size: 12px;" />
                            </nz-input-group>
                            <ng-template #suffixIconSearch>
                                <span nz-icon nzType="search" (click)="loadData()" style="cursor: pointer;"></span>
                            </ng-template>
                        </div>
                    </ng-template>
                </p-menubar>
            </div>
        </div>

        <div class="card-body p-0 w-100" style="height: calc(95vh - 45px)">
            <div *ngIf="isLoading" style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(255, 255, 255, 0.4);
          z-index: 999;
          display: flex;
          align-items: center;
          justify-content: center;
        ">
                <nz-spin [nzSpinning]="isLoading"></nz-spin>
            </div>

            <nz-splitter style="height: 100%">
                <!-- Panel trái: Grid danh sách tờ khai -->
                <nz-splitter-panel [nzSize]="isShowDetail ? '50%' : '100%'" [nzMin]="'25%'">
                    <nz-card class="h-100 card-custom" [nzBordered]="false">
                        <div class="grid-container-application" style="height: 100%">
                            <angular-slickgrid [gridId]="gridIdMain" [columns]="columnDefinitions"
                                [options]="gridOptions" [dataset]="dataset"
                                (onAngularGridCreated)="angularGridReady($event.detail)"
                                (onClick)="onCellClicked($event.detail.eventData, $event.detail.args)">
                            </angular-slickgrid>
                        </div>
                    </nz-card>
                </nz-splitter-panel>

                <!-- Panel phải: Preview phiếu ứng viên -->
                <nz-splitter-panel *ngIf="isShowDetail" [nzSize]="'50%'" [nzMin]="'30%'">
                    <div class="h-100 detail-panel">
                        <div class="detail-header">
                            <span class="detail-title">
                                <i class="fa-solid fa-file-lines me-1"></i>
                                Tờ khai: {{ selectedCandidateName }}-{{ selectedChucVu }}
                            </span>
                            <button nz-button nzType="text" nzSize="small" (click)="closeDetail()" title="Đóng preview">
                                <span nz-icon nzType="close"></span>
                            </button>
                        </div>
                        <div class="detail-body">
                            <app-home-layout-candidate *ngIf="isShowDetail && selectedCandidateID > 0"
                                [candidateId]="selectedCandidateID" [isEmbedded]="true">
                            </app-home-layout-candidate>
                        </div>
                    </div>
                </nz-splitter-panel>
            </nz-splitter>
        </div>
    </div>
</ng-container>

<!-- Modal xem phiếu ứng viên (mở bằng nút Xem phiếu hoặc double-click) -->
<nz-modal [(nzVisible)]="isShowModal" [nzTitle]="'Thông tin ứng viên - ' + selectedCandidateName" [nzWidth]="'100vw'"
    [nzBodyStyle]="{ height: 'calc(100vh - 55px)', overflow: 'auto', padding: '0' }" (nzOnCancel)="isShowModal = false"
    [nzFooter]="null" [nzStyle]="{ top: '0', 'padding-bottom': '0' }">
    <ng-container *nzModalContent>
        <app-home-layout-candidate *ngIf="isShowModal" [candidateId]="selectedCandidateID" [isEmbedded]="true">
        </app-home-layout-candidate>
    </ng-container>
</nz-modal>
