<p-menubar [model]="hrRecruitmentApproveMenu">
    <ng-template pTemplate="start">
        <div class="page-title ms-2 me-3">
            <span nz-icon nzType="solution" nzTheme="outline" class="me-2"></span>
            Phê Duyệt Tuyển Dụng
        </div>
    </ng-template>

    <!-- Toolbar tìm kiếm inline — đẩy sang phải -->
    <div class="ms-auto d-flex align-items-center gap-2 pe-3 flex-wrap">

        <!-- Từ ngày -->
        <div class="d-flex align-items-center gap-1">
            <span style="font-size:12px; color:#666; white-space:nowrap;">Từ ngày</span>
            <input type="date" class="form-control" style="width:140px; height:32px; font-size:12px; padding: 4px 8px;"
                [ngModel]="dateStart | date: 'yyyy-MM-dd'" (ngModelChange)="onDateChange('dateStart', $event)"
                name="dateStart2" />
        </div>

        <!-- Đến ngày -->
        <div class="d-flex align-items-center gap-1">
            <span style="font-size:12px; color:#666; white-space:nowrap;">Đến ngày</span>
            <input type="date" class="form-control" style="width:140px; height:32px; font-size:12px; padding: 4px 8px;"
                [ngModel]="dateEnd | date: 'yyyy-MM-dd'" (ngModelChange)="onDateChange('dateEnd', $event)"
                name="dateEnd2" />
        </div>

        <!-- Phòng ban -->
        <nz-select name="departmentId" [(ngModel)]="departmentId" nzPlaceHolder="Phòng ban" nzSize="default"
            style="width:170px;" nzAllowClear nzShowSearch>
            <nz-option *ngFor="let dept of departmentList" [nzValue]="dept.ID" [nzLabel]="dept.Name">
            </nz-option>
        </nz-select>
        <!-- Phòng ban -->
        <nz-form-item class="m-0">
            <nz-form-label style="font-size: 12px" class="me-1">Nhân viên</nz-form-label>
            <nz-form-control>
                <nz-select name="employeeId" [(ngModel)]="employeeId" nzShowSearch nzAllowClear
                    nzPlaceHolder="--Chọn nhân viên--" nzSize="small" style="width: 280px !important">
                    @for (parent of employees; track $index) {
                    <nz-option-group [nzLabel]="parent.label">
                        @for (child of parent.options; track $index) {
                        <nz-option nzCustomContent="true" [nzLabel]="child.item?.Code + ' - ' + child.item?.FullName"
                            [nzValue]="child.item.EmployeeID">
                            {{ child.item.Code + " - " + child.item.FullName }}
                        </nz-option>
                        }
                    </nz-option-group>
                    }
                </nz-select>
            </nz-form-control>
        </nz-form-item>
        <!-- Từ khóa + nút Tìm -->
        <nz-input-group nzSearch [nzAddOnAfter]="suffixSearch" nzSize="large" style="width:220px;">
            <input type="text" nz-input placeholder="Nhập từ khóa..." [(ngModel)]="keyword" name="keyword"
                (keyup.enter)="onSearch()" style="font-size:12px; height:32px;" />
        </nz-input-group>
        <ng-template #suffixSearch>
            <button nz-button nzType="primary" nzSearch nzSize="large"
                style="height:32px; line-height:30px; padding: 0 12px;" (click)="onSearch()">
                <span nz-icon nzType="search"></span>
            </button>
        </ng-template>

    </div>
</p-menubar>

<div class="position-relative" style="height: 90vh; width: 100%;">
    <nz-spin [nzSpinning]="isLoading" style="height:100%; display:block;">
        <app-custom-table [data]="tableData" [columns]="columns" [loading]="isLoading" dataKey="ID" [scrollable]="true"
            scrollHeight="flex" height="100%" [showGlobalFilter]="false" [paginator]="false" fontSize="12px"
            [clickSelectRow]="true" (rowClick)="handleRowClick($event)" selectionMode="multiple"
            [(selection)]="selectedRows" [textWrap]="true" (cellAction)="onCellAction($event)">
        </app-custom-table>
    </nz-spin>
</div>
