<div class="modal-header bg-primary text-uppercase py-2 flex-shrink-0">
  <h6 class="modal-title text-white">Chi tiết hạng mục</h6>
  <button
    type="button"
    class="btn-close"
    (click)="closeModal()"
    aria-label="Close"
  ></button>
</div>
<div
  class="modal-body p-2 flex-grow-1 overflow-visible"
  style="overflow-y: unset"
>
  <nz-spin [nzSpinning]="isLoading">
    <form nz-form [formGroup]="form" nzLayout="vertical" class="mt-2">
      <!-- Dòng 1: Mã hạng mục -->
      <div class="row gx-2">
        <div class="col-md-12">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12 mt-2">
              Mã hạng mục <span class="text-danger">*</span>
            </nz-form-label>
            <nz-form-control [nzErrorTip]="codeErrors">
              <input
                nz-input
                formControlName="TypeCode"
                placeholder="Nhập mã hạng mục..."
              />
              <ng-template #codeErrors let-control>
                <ng-container *ngIf="control.hasError('required')"
                  >Vui lòng nhập mã hạng mục!</ng-container
                >
                <ng-container *ngIf="control.hasError('maxlength')"
                  >Không được vượt quá 50 ký tự!</ng-container
                >
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <!-- Dòng 2: Tên hạng mục -->
      <div class="row gx-2">
        <div class="col-md-12">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12 mt-2">
              Tên hạng mục <span class="text-danger">*</span>
            </nz-form-label>
            <nz-form-control [nzErrorTip]="nameErrors">
              <input
                nz-input
                formControlName="TypeName"
                placeholder="Nhập tên hạng mục..."
              />
              <ng-template #nameErrors let-control>
                <ng-container *ngIf="control.hasError('required')"
                  >Vui lòng nhập tên hạng mục!</ng-container
                >
                <ng-container *ngIf="control.hasError('maxlength')"
                  >Không được vượt quá 255 ký tự!</ng-container
                >
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </nz-spin>

  <div class="modal-footer flex-shrink-0" style="flex-wrap: nowrap !important">
    <button
      nz-button
      nzType="default"
      class="btn-default fs-12"
      (click)="closeModal(false)"
    >
      Đóng
    </button>
    <button
      nz-button
      nzType="primary"
      class="btn-primary fs-12"
      (click)="save(false)"
      [nzLoading]="isLoading"
    >
      Lưu
    </button>
    <button
      nz-button
      nzType="primary"
      class="btn-success fs-12"
      *ngIf="!isCheckmode"
      (click)="save(true)"
      [nzLoading]="isLoading"
    >
      Lưu và Thêm mới
    </button>
  </div>
</div>
