<div class="modal-header bg-primary text-uppercase py-2">
    <h6 class="modal-title text-white">{{ isEditMode ? 'SỬA' : 'THÊM' }} BÁO CÁO HÀNG NGÀY KẾ TOÁN</h6>
    <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-2" style="height: 80vh; overflow-y: auto;">
    <form [formGroup]="dailyReportForm">
        <div formArrayName="reports">
            <div *ngFor="let report of reports.controls; let i = index" [formGroupName]="i" class="mb-3">
                <nz-card nzSize="small" [nzTitle]="'Báo cáo #' + (i + 1)" [nzExtra]="extraTemplate">
                    <ng-template #extraTemplate>
                        <button nz-button nzType="text" nzDanger nzSize="small" (click)="removeReport(i)"
                            [disabled]="reports.length <= 1 || isEditMode">
                            <i class="fas fa-trash"></i>
                        </button>
                    </ng-template>

                    <div class="container-fluid">
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="mb-0 fs-12 d-inline">
                                    <span>Người phụ trách</span>
                                    <span class="text-danger">*</span>
                                </label>
                                <nz-select nzShowSearch nzPlaceHolder="Chọn người phụ trách" nzAllowClear nzSize="small"
                                    nzDropdownClassName="select-dropdown" class="w-100" formControlName="userId">
                                    <nz-option *ngFor="let item of users" [nzValue]="item.UserID"
                                        [nzLabel]="item.FullName"></nz-option>
                                </nz-select>
                                <small class="text-danger" *ngIf="isSubmitted && report.get('userId')?.invalid">
                                    Vui lòng chọn người phụ trách
                                </small>
                            </div>
                            <div class="col-md-6">
                                <label class="mb-0 fs-12 d-inline">
                                    <span>Ngày báo cáo</span>
                                    <span class="text-danger">*</span>
                                </label>
                                <nz-date-picker nzPlaceHolder="Chọn ngày" nzSize="small" class="w-100"
                                    formControlName="reportDate" nzFormat="dd/MM/yyyy"></nz-date-picker>
                                <small class="text-danger" *ngIf="isSubmitted && report.get('reportDate')?.invalid">
                                    Vui lòng chọn ngày báo cáo
                                </small>
                            </div>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12 d-inline">
                                    <span>Việc đã làm</span>
                                    <span class="text-danger">*</span>
                                </label>
                                <textarea nz-input formControlName="content" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập việc đã làm"></textarea>
                                <small class="text-danger" *ngIf="isSubmitted && report.get('content')?.invalid">
                                    Vui lòng nhập việc đã làm
                                </small>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12 d-inline">
                                    <span>Kết quả</span>
                                    <span class="text-danger">*</span>
                                </label>
                                <textarea nz-input formControlName="result" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập kết quả mong đợi / đạt được"></textarea>
                                <small class="text-danger" *ngIf="isSubmitted && report.get('result')?.invalid">
                                    Vui lòng nhập kết quả
                                </small>
                            </div>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12 d-inline">
                                    <span>Kế hoạch tiếp theo</span>
                                    <span class="text-danger">*</span>
                                </label>
                                <textarea nz-input formControlName="nextPlan" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập kế hoạch tiếp theo"></textarea>
                                <small class="text-danger" *ngIf="isSubmitted && report.get('nextPlan')?.invalid">
                                    Vui lòng nhập kế hoạch
                                </small>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12">Vấn đề tồn đọng</label>
                                <textarea nz-input formControlName="pendingIssues" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập vấn đề tồn đọng"></textarea>
                            </div>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12">Việc gấp/phát sinh</label>
                                <textarea nz-input formControlName="urgent" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập việc gấp hoặc phát sinh"></textarea>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="mb-0 fs-12">Lỗi/Vi phạm</label>
                                <textarea nz-input formControlName="mistakeOrViolation" rows="3" class="w-100 fs-12"
                                    placeholder="Nhập lỗi hoặc vi phạm"></textarea>
                            </div>
                        </div>
                    </div>
                </nz-card>
            </div>
        </div>

        <div class="mt-3 text-center" *ngIf="!isEditMode">
            <button nz-button nzType="dashed" class="w-100" (click)="addReport()">
                <i class="fas fa-plus me-2"></i> Thêm báo cáo
            </button>
        </div>
    </form>
</div>

<div class="modal-footer py-1">
    <button nz-button nzType="default" nzDanger="true" nzSize="default" (click)="closeModal()">Đóng</button>
    <button nz-button nzType="primary" nzSize="default" (click)="saveAndClose()" [nzLoading]="isSaving">Lưu</button>
</div>
