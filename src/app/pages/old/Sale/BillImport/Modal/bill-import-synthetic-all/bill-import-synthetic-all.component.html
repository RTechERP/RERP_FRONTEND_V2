<div class="d-flex flex-column h-100">

  <!-- Filter bar -->
  <div class="p-2 border-bottom bg-white flex-shrink-0">
    <form nz-form nzLayout="vertical">
      <div nz-row [nzGutter]="8" nzAlign="bottom">

        <div nz-col [nzXs]="12" [nzSm]="6" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">Từ</nz-form-label>
            <nz-form-control>
              <nz-date-picker [nzFormat]="dateFormat" nzSize="small" [(ngModel)]="searchParams.dateStart"
                name="dateStart" [nzDisabled]="checked" class="w-100" [nzAllowClear]="false"></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="12" [nzSm]="6" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">Đến</nz-form-label>
            <nz-form-control>
              <nz-date-picker [nzFormat]="dateFormat" nzSize="small" [(ngModel)]="searchParams.dateEnd" name="dateEnd"
                [nzDisabled]="checked" class="w-100" [nzAllowClear]="false"></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="8" [nzSm]="4" [nzMd]="3" [nzLg]="2">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <label nz-checkbox [(ngModel)]="checked" name="checked" (ngModelChange)="onCheckboxChange()">
                Tất cả
              </label>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="16" [nzSm]="12" [nzMd]="6" [nzLg]="4">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">Lọc kho</nz-form-label>
            <nz-form-control>
              <nz-select [(ngModel)]="selectedKhoTypes" (ngModelChange)="onKhoTypeChange($event)" [nzMode]="'multiple'"
                [nzPlaceHolder]="'Chọn nhóm kho'" [nzMaxTagCount]="1" nzSize="small" class="w-100"
                name="selectedKhoTypes">
                <nz-option *ngFor="let item of dataProductGroup" [nzLabel]="item.ProductGroupName"
                  [nzValue]="item.ID"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="24" [nzSm]="12" [nzMd]="6" [nzLg]="3">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">Lọc phiếu</nz-form-label>
            <nz-form-control>
              <nz-select nzShowSearch nzAllowClear nzSize="small" [(ngModel)]="searchParams.status" name="status"
                class="w-100">
                <nz-option *ngFor="let item of cbbStatus" [nzValue]="item.ID" [nzLabel]="item.Name"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="12" [nzSm]="8" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">Từ khóa</nz-form-label>
            <nz-form-control>
              <input nz-input placeholder="Nhập từ khóa" [(ngModel)]="searchParams.keyword" name="keyword"
                nzSize="small" class="w-100" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="6" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button class="fs-12 btn w-100" nz-button nzType="primary" nzSize="small"
                (click)="loadDataBillImportSynthetic()">
                Tìm kiếm
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="6" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button class="fs-12 btn w-100" nz-button nzType="default" nzSize="small" title="Xuất Excel"
                (click)="exportExcel()">
                <nz-icon nzType="file-excel"></nz-icon> Excel
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="12" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button class="fs-12 btn w-100" nz-button nzType="primary" *hasPermission="'N35'" nzSize="small"
                (click)="saveData()">
                Lưu
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>

      </div>
    </form>
  </div>

  <!-- Grid -->
  <div id="gridContainer" class="flex-grow-1 position-relative">
    <angular-slickgrid [gridId]="gridId" [columns]="columnDefinitions" [options]="gridOptions" [dataset]="dataset"
      (onAngularGridCreated)="angularGridReady($event.detail)"></angular-slickgrid>

    <!-- Active Filters Display -->
    <div *ngIf="activeFilters.length" class="active-filter-bar" style="position:absolute; bottom:2.5vh; left:0; z-index:10; max-width:100%;
                height:24px; display:flex; align-items:center; flex-wrap:nowrap; overflow:visible;
                background:#fff; border-top:1px solid #e8e8e8; font-size:11px; pointer-events:auto;">

      <!-- Nút xóa -->
      <button class="btn btn-sm p-0 px-1 flex-shrink-0" style="color:#ff4d4f; font-size:11px; line-height:1.2;"
        (click)="clearAllFilters()" title="Xóa tất cả bộ lọc">✕</button>

      <!-- Chips: overflow hidden -->
      <div style="display:flex; align-items:center; gap:4px; overflow:hidden; white-space:nowrap; flex:1; min-width:0;">
        <ng-container *ngFor="let f of activeFilters; let i = index">
          <span *ngIf="i > 0" class="text-muted mx-1">And</span>
          <span class="badge bg-light text-dark border" style="font-size:11px; font-weight:normal; flex-shrink:0;">{{
            f.columnName }}</span>
          <span class="text-muted" style="flex-shrink:0;">{{ f.operator }}</span>
          <span class="badge"
            style="background:#e6f4ff; color:#1677ff; border:1px solid #91caff; font-size:11px; font-weight:normal; flex-shrink:0;">{{
            f.searchTerm }}</span>
        </ng-container>
      </div>
    </div>

    <div *ngIf="isLoading"
      class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
      style="background: rgba(255,255,255,0.8); z-index: 1000">
      <nz-spin [nzSpinning]="true" nzTip="Đang tải dữ liệu..."></nz-spin>
    </div>
  </div>

</div>
