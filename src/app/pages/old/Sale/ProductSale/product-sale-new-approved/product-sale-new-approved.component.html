<ng-container class="w-100">
    <div class="card h-100 border-0 rounded-0" style="background: transparent">
        <div class="card-header bg-white p-1">
            <div class="d-flex gap-1 align-items-center">
                <p-menubar [model]="productSaleNewApprovedMenus" class="p-0 border-0">
                </p-menubar>
            </div>
        </div>
        <div class="filter-bar bg-light border-bottom p-2 py-0" *ngIf="true" [class.mobile-modal]="true">
            <form nz-form nzLayout="inline" class="d-flex flex-wrap gap-2 align-items-center">
                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12">Từ khóa</nz-form-label>
                    <nz-form-control>
                        <input name="keyword" nz-input placeholder="Nhập từ khóa" [(ngModel)]="keyWords" nzSize="small"
                            style="width: 200px; font-size: 12px" (keyup.enter)="onSearch()" />
                    </nz-form-control>
                </nz-form-item>

                <!-- Nút tìm kiếm -->
                <nz-form-item class="mb-0">
                    <nz-form-control>
                        <button nz-button nzType="primary" nzSize="small" (click)="onSearch()">
                            Tìm kiếm
                        </button>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </div>
        <div class="card-body p-0 w-100" style="height: calc(100vh - 200px)">
            <div *ngIf="isLoading" style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(255, 255, 255, 0.4);
          z-index: 999;
          display: flex;
          align-items: center;
          justify-content: center;
        ">
                <nz-spin [nzSpinning]="isLoading"></nz-spin>
            </div>
            <div class="product-sale-new-approved-grid-container" style="height: 100%">
                <angular-slickgrid [gridId]="'productSaleNewApprovedGrid'" [columns]="columnDefinitions"
                    [options]="gridOptions" [dataset]="dataset"
                    (onAngularGridCreated)="angularGridReady($event.detail)">
                </angular-slickgrid>
            </div>
        </div>
    </div>
</ng-container>
