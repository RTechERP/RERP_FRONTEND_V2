<div class="modal-header bg-primary text-uppercase py-2" *ngIf="isFromPOKH">
  <h6 class="modal-title text-white">Tìm kiếm kho</h6>
  <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
</div>

<ng-container class="w-100">
  <div class="card border-0 rounded-0 h-100">
    <nz-splitter style="height: 100%">
      <!-- Cột trái: Product Group + Warehouse -->
      <nz-splitter-panel nzDefaultSize="20%" style="height: 100%">
        <div class="d-flex flex-column h-100">
          <!-- Toolbar Nhóm TB cho Desktop -->
          <div class="card-header bg-white p-1 action-bar d-none d-md-flex align-items-center border-bottom">
            <div class="d-flex gap-1 flex-wrap align-items-center">
              <button nz-button nzType="default" nzSize="small" class="btn-add" (click)="openModalProductGroup(false)"
                *hasPermission="'N27,N1'" title="Thêm nhóm TB">
                <img src="assets/icon/action_add_group_16.png" alt="Thêm mới" />Thêm nhóm
              </button>
              <button nz-button nzType="default" nzSize="small" class="btn-edit" (click)="openModalProductGroup(true)"
                *hasPermission="'N27,N1'" title="Sửa nhóm TB">
                <img src="assets/icon/action_edit_item_16.png" alt="Sửa nhóm TB" />Sửa nhóm
              </button>
              <button nz-button nzType="default" nzSize="small" class="btn-delete" (click)="deleteProductGroup()"
                *hasPermission="'N27,N1'" title="Xóa nhóm TB">
                <img src="assets/icon/action_delete_item_16.png" alt="Xóa nhóm TB" />Xóa nhóm
              </button>
              <button nz-button nzType="default" nzSize="small" class="btn-edit"
                (click)="openModalSettingProductGroup()" *hasPermission="'N1'" title="Thiết lập nhóm">
                Thiết lập
              </button>
              <button nz-button nzType="default" nzSize="small" style="
                  background-color: #ffe0e0;
                  pointer-events: none;
                  opacity: 0.85;
                  color: #cc0000;
                  padding: 0 4px;
                ">
                Đã xóa
              </button>
              <label nz-checkbox [(ngModel)]="isShowProductGroupDeleted" name="isShowProductGroupDeleted"
                (nzCheckedChange)="getProductGroup()" class="fs-12 text-nowrap ms-1">Đã xóa</label>
            </div>
          </div>

          <!-- Toolbar Nhóm TB cho Mobile -->
          <div class="card-header bg-white p-1 action-bar d-flex d-md-none align-items-center border-bottom">
            <div ngbDropdown class="dropdown">
              <button class="btn btn-primary btn-sm" ngbDropdownToggle>
                <i class="fa fa-bars me-1"></i>Nhóm TB
              </button>
              <div ngbDropdownMenu class="dropdown-menu">
                <button ngbDropdownItem (click)="openModalProductGroup(false)" *hasPermission="'N27,N1'">Thêm nhóm TB</button>
                <button ngbDropdownItem (click)="openModalProductGroup(true)" *hasPermission="'N27,N1'">Sửa nhóm TB</button>
                <button ngbDropdownItem (click)="deleteProductGroup()" *hasPermission="'N27,N1'">Xóa nhóm TB</button>
                <button ngbDropdownItem (click)="openModalSettingProductGroup()" *hasPermission="'N1'">Thiết lập nhóm</button>
              </div>
            </div>
            <label nz-checkbox [(ngModel)]="isShowProductGroupDeleted" name="isShowProductGroupDeleted"
              (nzCheckedChange)="getProductGroup()" class="fs-12 text-nowrap ms-auto">Đã xóa</label>
          </div>

          <!-- Grids bên trái -->
          <div class="flex-grow-1" style="height: calc(100% - 40px); overflow: hidden">
            <nz-splitter nzLayout="vertical" style="height: 100%">
              <!-- Product Group Grid -->
              <nz-splitter-panel nzDefaultSize="70%">
                <div [id]="'grid-container-product-group-' + warehouseCode" class="grid-container-product-group"
                  style="height: 100%">
                  <angular-slickgrid [gridId]="'grvProductGroup-' + warehouseCode"
                    [columns]="columnDefinitionsProductGroup" [options]="gridOptionsProductGroup"
                    [dataset]="datasetProductGroup" (onAngularGridCreated)="
                      angularGridProductGroupReady($event.detail)
                    " (onClick)="
                      onProductGroupCellClicked(
                        $event.detail.eventData,
                        $event.detail.args
                      )
                    " (onDblClick)="
                      onProductGroupDblClick(
                        $event.detail.eventData,
                        $event.detail.args
                      )
                    ">
                  </angular-slickgrid>
                </div>
              </nz-splitter-panel>

              <!-- Product Group Warehouse Grid -->
              <nz-splitter-panel style="overflow: auto">
                <div [id]="'grid-container-pg-warehouse-' + warehouseCode" class="grid-container-pg-warehouse"
                  style="height: 100%">
                  <angular-slickgrid [gridId]="'grvPGWarehouse-' + warehouseCode"
                    [columns]="columnDefinitionsPGWarehouse" [options]="gridOptionsPGWarehouse"
                    [dataset]="datasetPGWarehouse" (onAngularGridCreated)="
                      angularGridPGWarehouseReady($event.detail)
                    ">
                  </angular-slickgrid>
                </div>
              </nz-splitter-panel>
            </nz-splitter>
          </div>
        </div>
      </nz-splitter-panel>

      <!-- Cột phải: Product Sale Grid -->
      <nz-splitter-panel>
        <div class="d-flex flex-column h-100">
          <!-- Toolbar Sản phẩm cho Desktop -->
          <div class="card-header bg-white p-1 action-bar d-none d-md-flex align-items-center justify-content-between border-bottom">
            <div class="flex-grow-1" style="overflow-x: auto">
              <div class="d-flex gap-1 flex-nowrap align-items-center">
                <!-- Thiết bị -->
                <button nz-button nzType="default" nzSize="small" class="btn-add" (click)="openModalForNewProductSale()"
                  *hasPermission="'N27,N35,N1,N33,N34'">
                  <img src="assets/icon/action_add_item_16.png" alt="Thêm thiết bị" />Thêm
                </button>
                <button nz-button nzType="default" nzSize="small" class="btn-edit" (click)="updateProductSale()"
                  *hasPermission="'N27,N35,N1,N33,N34,N108'">
                  <img src="assets/icon/action_edit_item_16.png" alt="Sửa thiết bị" />Sửa
                </button>
                <button nz-button nzType="default" nzSize="small" class="btn-delete" (click)="deleteProductSale()"
                  *hasPermission="'N27,N35,N1,N33,N34'">
                  <img src="assets/icon/action_delete_item_16.png" alt="Xóa thiết bị" />Xóa
                </button>
                <button nz-button nzType="default" nzSize="small" class="btn-edit" (click)="projectApprovedIsfix(true)"
                  *hasPermission="'N108'">TBP duyệt
                </button>
                <button nz-button nzType="default" nzSize="small" class="btn-delete" (click)="projectApprovedIsfix(false)"
                  *hasPermission="'N108'">TBP hủy duyệt
                </button>

                <button nz-button nzType="default" nzSize="small" class="btn-standardized"
                  (click)="openModalSettingProductSale()" *ngIf="isAdmin">
                  Chuẩn hóa TB
                </button>
                <button nz-button nzType="default" nzSize="small" class="btn-standardized"
                  (click)="openModalProductSaleImportExport()" *ngIf="isAdmin">
                  Chuẩn hóa nhập xuất
                </button>

                <span class="mx-1 divider"></span>

                <!-- Import/Export -->
                <button nz-button nzType="default" nzSize="small" (click)="openModalImportExcel()"
                  *hasPermission="'N27,N1'">
                  <img src="assets/icon/action_import_16.png" alt="Nhập Excel" class="me-1" />Nhập excel
                </button>
                <button nz-button nzType="default" nzSize="small" (click)="exportExcel()">
                  <img src="assets/icon/action_export_excel_16.png" alt="Xuất Excel" class="me-1" />Xuất excel
                </button>

                <span class="mx-1 divider"></span>

                <!-- Requests -->
                <button nz-button nzType="default" nzSize="small" (click)="openPriceRequest()">
                  <nz-icon nzType="file-text" nzTheme="outline"></nz-icon>Yêu cầu báo giá
                </button>
                <button nz-button nzType="default" nzSize="small" (click)="openPurchaseRequest()">
                  <nz-icon nzType="shopping-cart" nzTheme="outline"></nz-icon>Yêu cầu mua hàng
                </button>
              </div>
            </div>

            <!-- Tìm kiếm desktop -->
            <div class="d-flex ms-auto align-items-center ps-2" style="flex: 0 0 auto; min-width: 260px">
              <label nz-checkbox [(ngModel)]="checkedALL" name="checkedALL" (nzCheckedChange)="getAllProductSale()"
                class="me-2 text-nowrap">Tất cả</label>
              <input type="text" nzSize="small" [(ngModel)]="keyword" name="keyword" nz-input class="fs-12 flex-grow-1"
                style="font-style: italic; min-width: 0" placeholder="Tìm kiếm" (keyup.enter)="getdataFind()" />
              <button nz-button nzSize="small" (click)="getdataFind()" class="ms-1">
                <nz-icon nzType="search"></nz-icon>
              </button>
            </div>
          </div>

          <!-- Toolbar Sản phẩm cho Mobile -->
          <div class="card-header bg-white p-1 action-bar d-flex d-md-none align-items-center justify-content-between border-bottom">
            <div ngbDropdown class="dropdown">
              <button class="btn btn-primary btn-sm" ngbDropdownToggle>
                <i class="fa fa-bars me-1"></i>Sản phẩm
              </button>
              <div ngbDropdownMenu class="dropdown-menu">
                <button ngbDropdownItem (click)="openModalForNewProductSale()" *hasPermission="'N27,N35,N1,N33,N34'">Thêm</button>
                <button ngbDropdownItem (click)="updateProductSale()" *hasPermission="'N27,N35,N1,N33,N34'">Sửa</button>
                <button ngbDropdownItem (click)="deleteProductSale()" *hasPermission="'N27,N35,N1,N33,N34'">Xóa</button>
                <div class="dropdown-divider"></div>
                <button ngbDropdownItem (click)="openModalImportExcel()" *hasPermission="'N27,N1'">Nhập excel</button>
                <button ngbDropdownItem (click)="exportExcel()">Xuất excel</button>
                <div class="dropdown-divider"></div>
                <button ngbDropdownItem (click)="openPriceRequest()">Yêu cầu báo giá</button>
                <button ngbDropdownItem (click)="openPurchaseRequest()">Yêu cầu mua hàng</button>
              </div>
            </div>

            <!-- Tìm kiếm mobile -->
            <div class="d-flex align-items-center ms-2" style="flex: 1; min-width: 0">
              <label nz-checkbox [(ngModel)]="checkedALL" name="checkedALL" (nzCheckedChange)="getAllProductSale()"
                class="me-2 text-nowrap">Tất cả</label>
              <input type="text" nzSize="small" [(ngModel)]="keyword" name="keyword" nz-input class="fs-12 flex-grow-1"
                style="font-style: italic; min-width: 0" placeholder="Tìm kiếm" (keyup.enter)="getdataFind()" />
              <button nz-button nzSize="small" (click)="getdataFind()" class="ms-1">
                <nz-icon nzType="search"></nz-icon>
              </button>
            </div>
          </div>

          <!-- Product Sale Grid -->
          <div class="position-relative flex-grow-1">
            <div [id]="'grid-container-product-sale-' + warehouseCode" class="grid-container-product-sale"
              style="height: 100%">
              <nz-spin [nzSpinning]="isLoading">
                <angular-slickgrid [gridId]="'grvProductSale-' + warehouseCode"
                  [columns]="columnDefinitionsProductSale" [options]="gridOptionsProductSale"
                  [dataset]="datasetProductSale" (onAngularGridCreated)="
                    angularGridProductSaleReady($event.detail)
                  " (onClick)="
                    onProductSaleCellClicked(
                      $event.detail.eventData,
                      $event.detail.args
                    )
                  " (onDblClick)="
                    onProductSaleDblClick(
                      $event.detail.eventData,
                      $event.detail.args
                    )
                  " (onSelectedRowsChanged)="
                    onProductSaleRowSelectionChanged(
                      $event.detail.eventData,
                      $event.detail.args
                    )
                  ">
                </angular-slickgrid>
              </nz-spin>
            </div>
          </div>
        </div>
      </nz-splitter-panel>
    </nz-splitter>
  </div>
</ng-container>

<div class="modal-footer" *ngIf="isFromPOKH">
  <button nz-button nzType="default" nzDanger="true" nzSize="default" (click)="closeModal()">
    Đóng
  </button>
</div>
