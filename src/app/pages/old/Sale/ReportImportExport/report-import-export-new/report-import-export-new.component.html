<div class="report-container h-100 report-import-export-new-report-container report-import-export-new-h-100">
    <!-- Header with filters and export button -->
    <div class="header-section p-2 bg-white border-bottom report-import-export-new-header-section report-import-export-new-p-2 report-import-export-new-bg-white report-import-export-new-border-bottom">
        <div class="d-flex flex-wrap align-items-center gap-2 report-import-export-new-d-flex report-import-export-new-flex-wrap report-import-export-new-align-items-center report-import-export-new-gap-2">
            <!-- Date filters -->
            <div class="d-flex align-items-center gap-1 report-import-export-new-d-flex report-import-export-new-align-items-center report-import-export-new-gap-1">
                <label class="fs-12 mb-0 report-import-export-new-fs-12 report-import-export-new-mb-0">Từ ngày:</label>
                <nz-date-picker [nzFormat]="dateFormat" nzSize="small" [(ngModel)]="searchParams.dateStart"
                    style="width: 120px;">
                </nz-date-picker>
            </div>

            <div class="d-flex align-items-center gap-1 report-import-export-new-d-flex report-import-export-new-align-items-center report-import-export-new-gap-1">
                <label class="fs-12 mb-0 report-import-export-new-fs-12 report-import-export-new-mb-0">Đến ngày:</label>
                <nz-date-picker [nzFormat]="dateFormat" nzSize="small" [(ngModel)]="searchParams.dateEnd"
                    style="width: 120px;">
                </nz-date-picker>
            </div>

            <!-- Keyword search -->
            <div class="d-flex align-items-center gap-1 report-import-export-new-d-flex report-import-export-new-align-items-center report-import-export-new-gap-1">
                <label class="fs-12 mb-0 report-import-export-new-fs-12 report-import-export-new-mb-0">Từ khóa:</label>
                <input nz-input placeholder="Nhập từ khóa" [(ngModel)]="searchParams.keyword"
                    (keyup.enter)="searchData()" nzSize="small" style="width: 150px;" />
            </div>

            <!-- Action buttons -->
            <button nz-button nzType="primary" nzSize="small" (click)="searchData()">
                <span nz-icon nzType="search"></span> Tìm kiếm
            </button>

            <button nz-button nzType="default" nzSize="small" (click)="resetForm()">
                <span nz-icon nzType="reload"></span> Đặt lại
            </button>

            <button class="fs-12 report-import-export-new-fs-12" nz-button nzType="default" nzSize="small" (click)="exportExcel()">
                <img class="btn-action-icon report-import-export-new-btn-action-icon" src="assets/icon/excel.png" /> Xuất Excel
            </button>
        </div>
    </div>

    <!-- Main content with grids -->
    <div class="content-section d-flex report-import-export-new-content-section report-import-export-new-d-flex" style="height: calc(100% - 50px);">
        <!-- Product Group Grid (Left panel - 20%) -->
        <div class="productgroup-panel report-import-export-new-productgroup-panel" style="width: 20%; min-width: 200px; border-right: 1px solid #ddd;">
            <div class="panel-header bg-light p-1 border-bottom report-import-export-new-panel-header report-import-export-new-bg-light report-import-export-new-p-1 report-import-export-new-border-bottom">
                <h6 class="m-0 fs-12 report-import-export-new-m-0 report-import-export-new-fs-12">Nhóm sản phẩm</h6>
            </div>
            <div [class]="containerClassProductGroup" style="height: calc(100% - 30px);">
                <nz-spin [nzSpinning]="isLoadingProductGroup">
                    <angular-slickgrid [gridId]="gridIdProductGroup" [columns]="columnDefinitionsProductGroup"
                        [options]="gridOptionsProductGroup" [dataset]="datasetProductGroup"
                        (onAngularGridCreated)="angularGridReadyProductGroup($event.detail)"
                        (onSelectedRowsChanged)="handleRowSelectionChangedProductGroup($event)"
                        (onDblClick)="handleRowDoubleClickProductGroup($event)">
                    </angular-slickgrid>
                </nz-spin>
            </div>
        </div>

        <!-- Report Grid (Right panel) -->
        <div class="report-panel flex-grow-1 report-import-export-new-report-panel report-import-export-new-flex-grow-1">
            <div [class]="containerClassReport" style="height: 100%;">
                <nz-spin [nzSpinning]="isLoading">
                    <angular-slickgrid [gridId]="gridIdReport" [columns]="columnDefinitionsReport"
                        [options]="gridOptionsReport" [dataset]="datasetReport"
                        (onAngularGridCreated)="angularGridReadyReport($event.detail)"
                        (onDblClick)="handleRowDoubleClickReport($event)">
                    </angular-slickgrid>
                </nz-spin>
            </div>
        </div>
    </div>
</div>
