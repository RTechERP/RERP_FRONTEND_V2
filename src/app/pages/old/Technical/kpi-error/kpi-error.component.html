<ng-container class="w-100">
    <div class="card h-100 border-0 rounded-0 d-flex flex-column">
        <div class="card-header bg-white p-0" style="flex-shrink: 0;">
            <p-menubar [model]="menuBars">
                <ng-template pTemplate="item" let-item>
                    <a class="p-menuitem-link" [ngClass]="item.styleClass">
                        <i [class]="item.icon"></i>
                        <span class="p-menuitem-text">{{ item.label }}</span>
                    </a>
                </ng-template>
            </p-menubar>
        </div>

        <div class="filter-bar bg-light border-bottom p-2">
            <form nz-form nzLayout="inline" class="d-flex flex-wrap gap-2 align-items-center">
                <nz-form-item class="mb-0">
                    <nz-form-label class="fs-12" style="font-size: 12px; display: flex; align-items: center;">
                        Từ khóa
                    </nz-form-label>
                    <nz-form-control>
                        <input nz-input placeholder="Nhập từ khóa" nzSize="small" [(ngModel)]="keyword" name="keyword"
                            style="width: 200px; font-size: 12px;" (keyup.enter)="search()" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-control>
                        <button nz-button nzType="primary" nzSize="small" (click)="search()" [nzLoading]="isLoading">
                            <nz-icon nzType="search"></nz-icon>
                            Tìm kiếm
                        </button>
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="mb-0">
                    <nz-form-control>
                        <button nz-button nzType="default" nzSize="small" (click)="openKPIErrorFineAmount()">
                            <nz-icon nzType="setting"></nz-icon>
                            Quản lý đánh giá
                        </button>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </div>

        <div class="card-body p-0 flex-grow-1 grid-container" style="min-height: 0; overflow: hidden;">
            <p-table [value]="dataset" [columns]="visibleColumns()" dataKey="ID" [scrollable]="true"
                scrollHeight="flex" styleClass="p-datatable-sm p-datatable-gridlines kpi-prime-table"
                rowGroupMode="subheader" groupRowsBy="TypeName" sortField="TypeName" sortMode="single"
                selectionMode="single" [(selection)]="selectedRow" [loading]="isLoading"
                loadingIcon="pi pi-spin pi-spinner" [resizableColumns]="true" columnResizeMode="expand"
                (onRowSelect)="onPrimeRowSelect($event)">

                <ng-template pTemplate="colgroup" let-columns>
                    <colgroup>
                        <col *ngFor="let col of columns" [style.width]="getColumnWidth(col)">
                    </colgroup>
                </ng-template>

                <ng-template pTemplate="header">
                    <tr>
                        <th *ngFor="let col of baseColumns()" pResizableColumn [pSortableColumn]="col.field"
                            [style.min-width]="getColumnWidth(col)" [style.width]="getColumnWidth(col)"
                            [attr.rowspan]="groupedColumns('Đánh giá').length ? 2 : 1">
                            <div class="table-header-cell">
                                <span>{{ col.name }}</span>
                                <p-sortIcon [field]="col.field"></p-sortIcon>
                            </div>
                        </th>
                        <th *ngIf="groupedColumns('Đánh giá').length" class="text-center"
                            [attr.colspan]="groupedColumns('Đánh giá').length">
                            Đánh giá
                        </th>
                    </tr>
                    <tr *ngIf="groupedColumns('Đánh giá').length">
                        <th *ngFor="let col of groupedColumns('Đánh giá')" pResizableColumn
                            [pSortableColumn]="col.field" [style.min-width]="getColumnWidth(col)"
                            [style.width]="getColumnWidth(col)">
                            <div class="table-header-cell justify-content-end">
                                <span>{{ col.name }}</span>
                                <p-sortIcon [field]="col.field"></p-sortIcon>
                            </div>
                        </th>
                    </tr>
                    <tr>
                        <th *ngFor="let col of visibleColumns()" class="filter-cell">
                            <p-columnFilter *ngIf="col.filterable" [type]="getColumnFilterType(col)"
                                [field]="col.field" display="row" [showMenu]="false" matchMode="contains"
                                placeholder="Tìm"></p-columnFilter>
                        </th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="groupheader" let-rowData>
                    <tr pRowGroupHeader class="group-row">
                        <td [attr.colspan]="visibleColumns().length">
                            <span class="group-title">Loại lỗi: {{ getGroupHeader(rowData) }}</span>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-rowData let-columns="columns">
                    <tr [pSelectableRow]="rowData" (click)="onRowClick(rowData)" class="data-row"
                        [ngClass]="{ 'selected-row': selectedId === rowData.ID }">
                        <td *ngFor="let col of columns" [ngClass]="getCellClass(col)"
                            [style.min-width]="getColumnWidth(col)" [style.width]="getColumnWidth(col)">
                            <span class="cell-content" [title]="getCellTitle(rowData, col)">
                                {{ formatCell(rowData, col) }}
                            </span>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage" let-columns>
                    <tr>
                        <td [attr.colspan]="columns.length" class="text-center text-muted py-3">
                            Không có dữ liệu
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</ng-container>
