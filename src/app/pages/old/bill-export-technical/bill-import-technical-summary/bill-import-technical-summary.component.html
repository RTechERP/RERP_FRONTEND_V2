<!-- Filter Section -->
<div class="filter-section">
  <nz-spin [nzSpinning]="isLoading">
    <div class="filter-row">
      <!-- Date Range -->
      <div class="filter-item">
        <label>Từ:</label>
        <input nz-input type="date" [(ngModel)]="searchParams.dateStart" [disabled]="searchParams.checkAll" />
      </div>

      <div class="filter-item">
        <label>Đến:</label>
        <input nz-input type="date" [(ngModel)]="searchParams.dateEnd" [disabled]="searchParams.checkAll" />
      </div>

      <div class="filter-item">
        <label nz-checkbox [(ngModel)]="searchParams.checkAll" (ngModelChange)="onCheckAllChange($event)">
          Tất cả
        </label>
      </div>

      <!-- Bill Type Filter -->
      <div class="filter-item">
        <label>Lọc phiếu:</label>
        <nz-select [(ngModel)]="searchParams.billType" nzPlaceHolder="Chọn loại phiếu" style="width: 200px;">
          <nz-option *ngFor="let type of billTypes" [nzValue]="type.ID" [nzLabel]="type.Name">
          </nz-option>
        </nz-select>
      </div>

      <div class="filter-item">
        <label>Lọc kho:</label>
        <nz-select [(ngModel)]="searchParams.warehouseId" (ngModelChange)="onWarehouseChange($event)"
          nzPlaceHolder="Chọn kho" style="width: 200px;" [nzAllowClear]="true">
          <nz-option *ngFor="let type of warehouseList" [nzValue]="type.ID" [nzLabel]="type.WarehouseName">
          </nz-option>
        </nz-select>
      </div>

      <!-- Search Keyword -->
      <div class="filter-item">
        <label>Từ khóa:</label>
        <input nz-input type="text" [(ngModel)]="searchParams.filterText" placeholder="Tìm theo số phiếu, NCC, NV..."
          style="width: 250px;" />
      </div>

      <!-- Search Button -->
      <div class="filter-item">
        <button nz-button nzType="primary" (click)="onSearch()" [disabled]="isLoading">
          <i nz-icon nzType="search" nzTheme="outline"></i>
          Tìm kiếm
        </button>
        <button nz-button nzType="primary" (click)="exportExcel()" [disabled]="isLoading || dataset.length === 0">
          <i nz-icon nzType="file-excel" nzTheme="outline"></i>
          Xuất Excel
        </button>
        <button nz-button nzType="primary" (click)="saveChanges()" [disabled]="isLoading || changedRows.size === 0">
          <i nz-icon nzType="save" nzTheme="outline"></i>
          Lưu hóa đơn
        </button>
      </div>
    </div>
    <nz-divider></nz-divider>

    <!-- Grid Section -->
    <div class="grid-section" id="gridContainer">
      <angular-slickgrid gridId="grid-bill-import-technical-summary" [columns]="columnDefinitions"
        [options]="gridOptions" [dataset]="dataset" (onAngularGridCreated)="angularGridReady($event)">
      </angular-slickgrid>
    </div>
  </nz-spin>
</div>
