<div class="detail-container p-3">
  <form nz-form [formGroup]="form" nzLayout="vertical">
    <div class="row">
      <div class="col-md-12">
        <nz-form-item>
          <nz-form-label nzRequired>Danh mục</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng chọn danh mục">
            <nz-select formControlName="ProjectTypeID" nzPlaceHolder="Chọn danh mục..." nzAllowClear nzShowSearch>
              <nz-option *ngFor="let option of projectTypeOptions" [nzValue]="option.value"
                [nzLabel]="option.label"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-md-12">
        <nz-form-item>
          <nz-form-label nzRequired>Tên bản vẽ</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập tên bản vẽ">
            <input nz-input formControlName="DrawingName" placeholder="Nhập tên bản vẽ..." />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div class="col-md-12">
        <nz-form-item>
          <nz-form-label nzRequired>Phiên bản (Version)</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập phiên bản">
            <input nz-input formControlName="Version" placeholder="V1.0..." />
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-md-6">
        <nz-form-item>
          <nz-form-label>Người thiết kế</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="DesignByID" nzPlaceHolder="Chọn người thiết kế" nzAllowClear nzShowSearch>
              <nz-option *ngFor="let option of employeeOptions" [nzValue]="option.value"
                [nzLabel]="option.label"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div class="col-md-6">
        <nz-form-item>
          <nz-form-label>Ngày thiết kế</nz-form-label>
          <nz-form-control>
            <nz-date-picker formControlName="DesignDate" nzFormat="dd/MM/yyyy" style="width: 100%;"></nz-date-picker>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
  </form>

  <div class="detail-footer d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
    <button nz-button nzType="default" (click)="destroyModal()">
      <i class="fa-solid fa-xmark me-2"></i>Đóng
    </button>
    <button nz-button nzType="primary" (click)="submitForm()" [nzLoading]="isSubmitting">
      <i class="fa-solid fa-floppy-disk me-2" *ngIf="!isSubmitting"></i>Lưu lại
    </button>
  </div>
</div>
