<div class="drawing-project-page" [style.height]="isModalMode ? '100vh' : 'calc(100vh - 40px - 1rem)'"
  style="display: flex; flex-direction: column; overflow: hidden; background-color: #fff;">
  <!-- Header -->
  <div *ngIf="isModalMode" class="bg-primary align-items-center ps-2 pe-2"
    style="flex-shrink: 0; display: flex; justify-content: space-between; padding: 0.5rem;">
    <h6 class="text-light text-uppercase m-0" style="padding: 0 0.5rem;">
      Bản vẽ dự án {{projectCode}}
    </h6>
    <button type="button" class="btn-close" (click)="onCloseModal()" aria-label="Close"></button>
  </div>

  <p-menubar [model]="menuBars" class="p-1">
    <ng-template pTemplate="item" let-item>
      <a class="p-menuitem-link" [ngClass]="item.styleClass" (click)="item.command ? item.command($event) : null">
        <i [class]="item.icon"></i>
        <span class="p-menuitem-text">{{ item.label }}</span>
      </a>
    </ng-template>
  </p-menubar>

  <div style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
    <app-custom-table style="height: 100%" [columns]="columns" [data]="data" [loading]="isLoading"
      dataKey="ID" [paginator]="false" [scrollable]="true" scrollHeight="flex" [lazyRenderThreshold]="0"
      [virtualScroll]="false" selectionMode="multiple" [(selection)]="selectedRows" [clickSelectRow]="true"
      (cellAction)="onCellAction($event)">
    </app-custom-table>
  </div>

</div>
