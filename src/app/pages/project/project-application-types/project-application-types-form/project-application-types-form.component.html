<div class="modal-header bg-primary align-items-center ps-2">
  <h6 class="text-light text-uppercase m-0" style="padding: 0 0.5rem;">
    {{ isEditMode ? 'SỬA LOẠI ỨNG DỤNG' : 'THÊM MỚI LOẠI ỨNG DỤNG' }}
  </h6>
  <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
</div>
<div class="modal-body">
  <nz-spin [nzSpinning]="isLoading">
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div class="row">
        <!-- Application Name -->
        <div class="col-md-12 mb-1">
          <nz-form-item class="mb-1">
            <nz-form-label nzRequired>Tên loại ứng dụng</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập tên loại ứng dụng!">
              <input nz-input formControlName="ApplicationName" placeholder="Nhập tên loại ứng dụng..." />
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Descriptions -->
        <div class="col-md-12 mb-0">
          <nz-form-item class="mb-0">
            <nz-form-label>Mô tả</nz-form-label>
            <nz-form-control>
              <textarea nz-input formControlName="Descriptions" rows="4" placeholder="Nhập mô tả..."></textarea>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </nz-spin>
</div>
<div class="modal-footer">
  <button nz-button nzType="default" class="btn-default" (click)="close()">Đóng</button>
  <button nz-button nzType="primary" class="btn-primary" (click)="save()" [nzLoading]="isLoading">Lưu</button>
</div>
