<div class="project-gate-step-container h-100 d-flex flex-column bg-white" style="height: 93vh !important;">
  <!-- Main Action MenuBar -->
  <p-menubar [model]="menuBars" styleClass="fs-12 border-0 mb-0 shadow-sm custom-menubar">
    <ng-template pTemplate="item" let-item>
      <a class="p-menuitem-link" [class.p-disabled]="item.disabled">
        <i [class]="item.icon"></i>
        <span class="p-menuitem-text ms-1" style="font-size: 12px;">{{ item.label }}</span>
      </a>
    </ng-template>
    <ng-template pTemplate="end">
      <div class="d-flex items-center gap-2 pe-2">
        <button nz-button nzType="text" nzShape="circle" (click)="toggleSearchPanel()">
          <nz-icon nzType="search" />
        </button>
      </div>
    </ng-template>
  </p-menubar>

  <!-- Search Filter Panel -->
  <div class="filter-bar bg-light border-bottom p-2" *ngIf="showSearchBar">
    <form nz-form>
      <nz-row [nzGutter]="[8, 8]" nzAlign="bottom">
        <!-- Lọc theo Template -->
        <nz-col [nzXs]="24" [nzSm]="18" [nzMd]="12" [nzLg]="8">
          <nz-form-item class="mb-0">
            <nz-form-label class="fs-12 fw-bold" style="font-size: 12px; font-weight: 600;">Mẫu Template</nz-form-label>
            <nz-form-control>
              <nz-select [(ngModel)]="templateId" name="templateId" nzPlaceHolder="-- Chọn mẫu template --" nzAllowClear
                nzShowSearch nzSize="small" style="width: 100%; font-size: 12px;"
                (ngModelChange)="onTemplateChange($event)">
                <nz-option-group *ngFor="let group of groupedTemplates" [nzLabel]="group.label">
                  <nz-option *ngFor="let item of group.options" [nzValue]="item.value" [nzLabel]="item.label"
                    [nzDisabled]="item.disabled">
                  </nz-option>
                </nz-option-group>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </nz-col>

      </nz-row>
    </form>
  </div>

  <!-- PrimeNG Table -->
  <div class="flex-grow-1 overflow-hidden p-2 bg-light">
    <nz-spin [nzSpinning]="loading" nzTip="Đang tải dữ liệu..." class="h-100">
      <div class="table-wrapper h-100 bg-white border rounded">
        <p-table #dt [value]="filteredDataset" [(selection)]="selectedItems" selectionMode="multiple" dataKey="ID"
          (onRowSelect)="updateMenuState()" (onRowUnselect)="updateMenuState()"
          (onHeaderCheckboxToggle)="updateMenuState()" styleClass="p-datatable-sm p-datatable-gridlines fs-12 h-100"
          [scrollable]="true" scrollHeight="flex" rowGroupMode="subheader" groupRowsBy="GateType">

          <ng-template pTemplate="header">
            <tr>
              <th style="width: 3rem; text-align: center;">
                <p-tableHeaderCheckbox />
              </th>
              <th *ngFor="let col of columns" [pSortableColumn]="col.field" [style.width]="col.width"
                class="text-center" style="font-size: 12px;">
                {{col.header}} <p-sortIcon [field]="col.field" />
              </th>
            </tr>
            <tr>
              <th></th>
              <th *ngFor="let col of columns">
                <input *ngIf="col.filterType === 'text'" pInputText type="text" [(ngModel)]="col.filterValue"
                  (input)="onFilterChange()" [placeholder]="'Lọc ' + col.header + '...'"
                  class="p-column-filter w-100 fs-12 px-2 py-1"
                  style="height: 28px; border: 1px solid #ced4da; border-radius: 4px; font-size: 12px;">
                <input *ngIf="col.filterType === 'number'" pInputText type="number" [(ngModel)]="col.filterValue"
                  (input)="onFilterChange()" placeholder="Lọc số..." class="p-column-filter w-100 fs-12 px-2 py-1"
                  style="height: 28px; border: 1px solid #ced4da; border-radius: 4px; font-size: 12px;">
              </th>
            </tr>
          </ng-template>

          <ng-template pTemplate="groupheader" let-item>
            <tr pRowGroupHeader>
              <td [attr.colspan]="columns.length + 1" class="bg-light fw-bold"
                style="font-size: 12px; padding: 6px 12px;">
                <span class="text-primary">
                  <i class="fa-solid fa-layer-group me-1"></i>
                  {{ item.GateType === 1 ? 'GIẢI PHÁP' : (item.GateType === 2 ? 'TRIỂN KHAI' : 'KHÁC') }}
                </span>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
            <tr [pSelectableRow]="item">
              <td class="text-center">
                <p-tableCheckbox [value]="item" />
              </td>
              <ng-container *ngFor="let col of columns">
                <!-- DepartmentNames, PositionNames & CheckListNames columns: wrap text -->
                <td
                  *ngIf="col.field === 'DepartmentNames' || col.field === 'PositionNames' || col.field === 'CheckListNames'"
                  [style.width]="col.width">
                  <span style="font-size: 12px; white-space: pre-wrap;">{{item[col.field]}}</span>
                </td>
                <!-- Remaining columns -->
                <td
                  *ngIf="col.field !== 'DepartmentNames' && col.field !== 'PositionNames' && col.field !== 'CheckListNames'"
                  [style.width]="col.width" [class.text-center]="col.field === 'TT' || col.field === 'SortOrder'">
                  <span style="font-size: 12px;">{{item[col.field]}}</span>
                </td>
              </ng-container>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td [attr.colspan]="columns.length + 1" class="text-center p-3 text-muted" style="font-size: 12px;">Không
                có dữ liệu</td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </nz-spin>
  </div>
</div>
