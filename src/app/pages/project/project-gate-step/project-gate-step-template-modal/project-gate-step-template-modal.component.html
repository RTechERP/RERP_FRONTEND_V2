<div class="modal-header bg-primary py-2 text-white">
  <h6 class="modal-title text-uppercase text-white">
    KHAI BÁO TEMPLATE CÔNG VIỆC GATE
  </h6>
  <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
</div>

<div class="modal-body fs-12" style="font-size: 12px; max-height: 60vh; overflow-y: auto;">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <span class="text-muted">Nhập mã và tên các template công việc để dùng làm mẫu khi khai báo công đoạn.</span>
    <button nz-button nzType="dashed" nzSize="small" (click)="onAddRow()">
      <i class="fa-solid fa-plus me-1"></i> Thêm dòng
    </button>
  </div>

  <div class="table-responsive border rounded bg-white">
    <table class="table table-sm table-bordered mb-0 align-middle">
      <thead class="table-light text-center fw-bold">
        <tr>
          <th style="width: 50px;">STT</th>
          <th style="width: 150px;">Mã Template <span class="text-danger">*</span></th>
          <th>Tên Template <span class="text-danger">*</span></th>
          <th style="width: 80px;">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of templates; let i = index">
          <td class="text-center">{{ i + 1 }}</td>
          <td>
            <input nz-input nzSize="small" [(ngModel)]="item.Code" placeholder="Mã..." class="w-100"
              style="font-size: 12px;" />
          </td>
          <td>
            <input nz-input nzSize="small" [(ngModel)]="item.Name" placeholder="Tên template..." class="w-100"
              style="font-size: 12px;" />
          </td>
          <td class="text-center">
            <button nz-button nzType="text" nzDanger (click)="onDeleteRow(i, item)" nzSize="small">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="templates.length === 0">
          <td colspan="4" class="text-center py-3 text-muted">Chưa có template nào. Vui lòng bấm "Thêm dòng".</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer fs-12 py-2" style="font-size: 12px;">
  <button nz-button nzType="default" nzDanger nzSize="small" (click)="onCancel()">
    <i class="fa-solid fa-xmark me-1"></i> Đóng
  </button>
  <button nz-button nzType="primary" nzSize="small" [nzLoading]="loading" (click)="onSubmit()">
    <i class="fa-solid fa-floppy-disk me-1"></i> Lưu
  </button>
</div>
