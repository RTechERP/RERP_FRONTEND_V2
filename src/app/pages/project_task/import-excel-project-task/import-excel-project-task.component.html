<div class="modal-content">
  <div class="modal-header bg-primary text-uppercase py-2">
    <h6 class="modal-title text-white" id="ExcelModalLabel">NHẬP DỮ LIỆU CÔNG VIỆC TỪ EXCEL</h6>
    <button type="button" class="btn-close-custom" (click)="onClose()" aria-label="Close">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="modal-body">
    <div class="d-flex gap-2 align-items-center p-2">
      <div class="flex-grow-1">
        <div class="progress-wrapper">
          <div style="text-align: center;" class="progress-text">{{ displayText }}</div>
          <nz-progress [nzPercent]="displayProgress" [nzShowInfo]="false"></nz-progress>
        </div>
      </div>
    </div>
    <form class="needs-validation" novalidate>
      <div class="d-flex flex-column gap-2 p-2">
        <div class="d-flex gap-2 align-items-center">
          <div class="d-flex align-items-center gap-2" style="flex: 2;">
            <label class="mb-0 fs-12" style="white-space: nowrap;">Đường dẫn:</label>
            <div class="d-flex gap-2 flex-grow-1">
              <input nz-input [style.width.%]="100" class="fs-12" name="path" id="pathInput" [(ngModel)]="filePath"
                [disabled]="true">
              <input type="file" class="d-none fs-12" id="fileInputTask" accept=".xlsx,.xls"
                (change)="onFileSelected($event)">
              <button type="button" class="btn btn-warning btn-sm" (click)="openFileExplorer()" style="height: auto;">
                <i class="fas fa-folder-open"></i>
              </button>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2" style="flex: 1;">
            <label class="mb-0 fs-12" style="white-space: nowrap;">Tên Sheet:</label>
            <select class="form-select form-select-sm fs-12" name="sheet" id="sheetSelect" [(ngModel)]="selectedSheet"
              (change)="onSheetChange()">
              <option value="">Chọn Sheet</option>
              <option *ngFor="let sheet of excelSheets" [value]="sheet">{{sheet}}</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card-body p-2">
        <div id="taskImportTable" class="table-container">
        </div>
      </div>
    </form>
    <div class="modal-footer">
      <button class="fs-12 btn" nz-button nzDanger (click)="onClose()" [disabled]="isSaving">Đóng</button>
      <button class="fs-12 btn" nz-button (click)="downloadTemplate()" [disabled]="isSaving">
        <nz-icon nzType="download" nzTheme="outline"></nz-icon> Mẫu
      </button>
      <button class="fs-12 btn" nz-button nzType="primary" (click)="saveExcelData()" [disabled]="isSaving"
        [nzLoading]="isSaving">Lưu</button>
    </div>
  </div>
</div>
