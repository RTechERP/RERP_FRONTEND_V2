<div class="modal-content" style="height: 90vh; display: flex; flex-direction: column;">
  <div class="modal-header bg-primary text-uppercase py-2 flex-shrink-0">
    <h6 class="modal-title text-white">NHẬP DỮ LIỆU EXCEL</h6>
    <button type="button" class="btn text-white border-0 p-1" style="background: transparent; box-shadow: none;"
      (click)="closeModal()">
      <i class="fas fa-times fa-lg"></i>
    </button>
  </div>

  <div class="modal-body p-2" style="flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column;">
    <!-- Progress -->
    <div class="progress-wrapper mb-2">
      <div class="text-center small mb-1">{{ displayText }}</div>
      <nz-progress [nzPercent]="displayProgress" [nzShowInfo]="false"></nz-progress>
    </div>

    <!-- Toolbar: file + sheet -->
    <div class="d-flex gap-2 align-items-center mb-2 flex-wrap">
      <div class="d-flex align-items-center gap-2 flex-grow-1">
        <label class="mb-0 text-nowrap small">Đường dẫn:</label>
        <input nz-input class="fs-12" style="width:100%" [(ngModel)]="filePath" [disabled]="true">
        <input type="file" class="d-none" id="filePriceInput" accept=".xlsx,.xls" (change)="onFileSelected($event)">
        <button type="button" class="btn btn-warning btn-sm" (click)="openFileExplorer()" title="Chọn file">
          <i class="fas fa-folder-open"></i>
        </button>
      </div>
      <div class="d-flex align-items-center gap-2" style="min-width:180px">
        <label class="mb-0 text-nowrap small">Sheet:</label>
        <select class="form-select form-select-sm fs-12" [(ngModel)]="selectedSheet" (change)="onSheetChange()">
          <option value="">Chọn Sheet</option>
          <option *ngFor="let s of excelSheets" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>

    <!-- Preview table (Tabulator) -->
    <div id="priceRequestImportTable" style="flex: 1 1 auto; min-height: 200px;"></div>
  </div>

  <!-- <div class="modal-footer py-1 gap-2 flex-shrink-0" style="border-top: 1px solid #dee2e6;">
    <button class="btn btn-sm btn-outline-secondary" (click)="downloadTemplate()" [disabled]="isSaving">
      <i class="pi pi-download me-1"></i>Tải mẫu
    </button>
    <button class="btn btn-sm btn-danger" (click)="closeModal()" [disabled]="isSaving">Đóng</button>
    <button class="btn btn-sm btn-primary" (click)="saveExcelData()" [disabled]="isSaving || !dataTableExcel.length">
      <span *ngIf="!isSaving"><i class="pi pi-save me-1"></i>Lưu</span>
      <span *ngIf="isSaving"><i class="pi pi-spin pi-spinner me-1"></i>Đang lưu...</span>
    </button>
  </div> -->
  <div class="modal-footer">
    <button class="fs-12 btn" nz-button nzDanger (click)="closeModal()" [disabled]="isSaving">Đóng</button>
    <button class="fs-12 btn" nz-button (click)="downloadTemplate()" [disabled]="isSaving">
      <nz-icon nzType="download" nzTheme="outline"></nz-icon> Mẫu
    </button>
    <button class="fs-12 btn" nz-button nzType="primary" (click)="saveExcelData()" [disabled]="isSaving"
      [nzLoading]="isSaving">Lưu</button>
  </div>
</div>
