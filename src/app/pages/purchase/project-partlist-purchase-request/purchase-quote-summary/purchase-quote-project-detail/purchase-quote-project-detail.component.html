<div class="modal-dialog-scrollable">
  <div class="modal-header bg-primary align-items-center ps-2 d-flex">
    <h6 class="text-light text-uppercase m-0">
      TỔNG HỢP chi tiết báo giá dự án
    </h6>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="activeModal.close()"
    ></button>
  </div>

  <div class="modal-body p-0">
    <ng-container class="w-100">
      <div class="card h-100 border-0 rounded-0">
        <div class="card-header bg-white p-0 px-1">
          <p-menubar [model]="purchaseQuoteSummaryMenu" class="p-1 border-0">
          </p-menubar>
        </div>
        <div
          class="filter-bar bg-light border-bottom p-2 py-0"
          *ngIf="shouldShowSearchBar"
          [class.mobile-modal]="true"
        >
          <form
            nz-form
            nzLayout="inline"
            class="d-flex flex-wrap gap-2 align-items-center"
          >
            <nz-form-item>
              <nz-form-label class="fs-12">Từ ngày</nz-form-label>
              <nz-form-control>
                <input
                  type="date"
                  class="form-control form-control-sm"
                  [(ngModel)]="dateStart"
                  name="dateStart"
                />
              </nz-form-control>
            </nz-form-item>
            <nz-form-item class="mt-0">
              <nz-form-label class="fs-12">Đến ngày</nz-form-label>
              <nz-form-control>
                <input
                  type="date"
                  class="form-control form-control-sm"
                  [(ngModel)]="dateEnd"
                  name="dateEnd"
                />
              </nz-form-control>
            </nz-form-item>

            <nz-form-item class="mb-1">
              <nz-form-label class="fs-12">Dự án</nz-form-label>
              <nz-form-control>
                <nz-select
                  style="width: 250px !important"
                  [(ngModel)]="projectId"
                  name="projectId"
                  nzShowSearch
                  nzAllowClear
                  nzSize="small"
                  nzPlaceHolder="Chọn dự án"
                >
                  <nz-option
                    *ngFor="let item of projects"
                    [nzLabel]="item.ProjectCode + '-' + item.ProjectName"
                    [nzValue]="item.ID"
                  ></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>

            <nz-form-item class="mb-0">
              <nz-form-label class="fs-12">Nhân viên</nz-form-label>
              <nz-form-control>
                <nz-select
                  name="employeeId"
                  [(ngModel)]="employeeId"
                  nzShowSearch
                  nzAllowClear
                  nzPlaceHolder="--Chọn nhân viên--"
                  nzSize="small"
                  style="width: 250px !important"
                  [nzDisabled]="!isTBP"
                >
                  <ng-container *ngFor="let group of employees">
                    <nz-option-group [nzLabel]="group.label">
                      <nz-option
                        *ngFor="let option of group.options"
                        [nzLabel]="
                          option.item.Code + ' - ' + option.item.FullName
                        "
                        [nzValue]="option.item.EmployeeID"
                      >
                      </nz-option>
                    </nz-option-group>
                  </ng-container>
                </nz-select>
              </nz-form-control>
            </nz-form-item>
            <nz-form-item class="mb-0">
              <nz-form-label class="fs-12">Trạng thái</nz-form-label>
              <nz-form-control>
                <nz-select
                  [(ngModel)]="status"
                  name="status"
                  nzPlaceHolder="Trạng thái"
                  nzSize="small"
                  style="width: 180px !important"
                >
                  <nz-option [nzValue]="0" nzLabel="--Tất cả--"></nz-option>
                  <nz-option
                    [nzValue]="1"
                    nzLabel="Yêu cầu báo giá"
                  ></nz-option>
                  <nz-option [nzValue]="2" nzLabel="Đã báo giá"></nz-option>
                  <nz-option [nzValue]="3" nzLabel="Hoàn thành"></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>

            <nz-form-item class="mb-0">
              <nz-form-label class="fs-12" style="font-size: 12px"
                >Từ khóa</nz-form-label
              >
              <nz-form-control>
                <input
                  nz-input
                  placeholder="Nhập từ khóa"
                  nzSize="small"
                  [(ngModel)]="filterText"
                  name="filterText"
                  style="width: 180px; font-size: 12px"
                />
              </nz-form-control>
            </nz-form-item>

            <!-- Nút tìm kiếm với dropdown cho filter bổ sung -->
            <nz-form-item class="mb-0">
              <nz-form-control>
                <div class="btn-group">
                  <button
                    nz-button
                    nzType="primary"
                    nzSize="small"
                    (click)="onSearch()"
                  >
                    Tìm kiếm
                  </button>
                </div>
              </nz-form-control>
            </nz-form-item>
          </form>
        </div>
        <div class="card-body p-0 ps-1">
          <div *ngIf="isLoading">
            <nz-spin
              [nzSpinning]="isLoading"
              nzSimple
              [style]="{
                position: 'absolute',
                top: '0',
                left: '0',
                width: '100%',
                height: '100%',
                background: 'rgba(255,255,255,0.4)',
                zIndex: '999',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
              }"
            ></nz-spin>
          </div>

          <div class="grid-container-summary-purchase-quote">
            <angular-slickgrid
              gridId="gridSummaryPurchaseQuote"
              [columns]="columnDefinitionsMaster"
              [options]="gridOptionsMaster"
              [dataset]="summaryData"
              (onAngularGridCreated)="angularGridMasterReady($event.detail)"
            >
            </angular-slickgrid>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
