<ng-container class="w-100">
  <div class="card h-100 border-0 rounded-0" style="background: transparent">
    <div class="card-header bg-white p-0 position-relative">
      <p-menubar [model]="purchaseQuoteSummaryMenu" class="p-0 border-0 p-1">
      </p-menubar>
    </div>

    <!-- Backdrop overlay cho mobile -->
    <div
      class="filter-backdrop"
      *ngIf="shouldShowSearchBar"
      (click)="ToggleSearchPanelNew()"
      [class.mobile-only]="true"
    ></div>

    <!-- Filter bar - hiển thị dạng hàng ngang trên desktop, modal trên mobile  -->
    <div
      class="filter-bar bg-light border-bottom p-1"
      *ngIf="shouldShowSearchBar"
      [class.mobile-modal]="true"
    >
      <form
        nz-form
        nzLayout="inline"
        class="d-flex flex-wrap gap-2 align-items-center"
      >
        <!-- Các filter mặc định hiển thị -->
        <nz-form-item class="m-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Từ ngày</nz-form-label
          >
          <nz-form-control>
            <input
              type="date"
              [(ngModel)]="dateStart"
              name="dateStart"
              style="
                width: 150px;
                font-size: 12px;
                height: 24px;
                border: 1px solid #d9d9d9;
                border-radius: 2px;
                padding: 0 11px;
              "
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="m-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Đến ngày</nz-form-label
          >
          <nz-form-control>
            <input
              type="date"
              [(ngModel)]="dateEnd"
              name="dateEnd"
              style="
                width: 150px;
                font-size: 12px;
                height: 24px;
                border: 1px solid #d9d9d9;
                border-radius: 2px;
                padding: 0 11px;
              "
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="m-0">
          <nz-form-label class="fs-12">Phòng ban</nz-form-label>
          <nz-form-control>
            <nz-select
              name="departmentId"
              [(ngModel)]="departmentId"
              nzShowSearch
              nzPlaceHolder="--Chọn phòng ban--"
              nzSize="small"
              style="width: 250px"
              [nzDisabled]="true"
            >
              <ng-container *ngFor="let option of departments">
                <nz-option
                  [nzLabel]="option.Name"
                  [nzValue]="option.ID"
                ></nz-option>
              </ng-container>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="m-0">
          <nz-form-label class="fs-12">Nhân viên</nz-form-label>
          <nz-form-control [nzSpan]="24">
            <nz-select
              name="employeeRequestId"
              nzSize="small"
              style="width: 280px"
              nzShowSearch
              nzAllowClear
              nzPlaceHolder="--Chọn nhân viên--"
              [(ngModel)]="employeeRequestId"
              [nzDisabled]="!isTBP"
            >
              @for (parent of employeeRequests; track $index) {
                <nz-option-group [nzLabel]="parent.label">
                  @for (child of parent.options; track $index) {
                    <nz-option
                      nzCustomContent="true"
                      [nzLabel]="
                        child.item?.Code + ' - ' + child.item?.FullName
                      "
                      [nzValue]="child.item.EmployeeID"
                    >
                      {{ child.item.Code + " - " + child.item.FullName }}
                    </nz-option>
                  }
                </nz-option-group>
              }
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="m-0">
          <nz-form-label class="fs-12" style="font-size: 12px"
            >Từ khóa</nz-form-label
          >
          <nz-form-control>
            <input
              nz-input
              placeholder="Nhập từ khóa"
              nzSize="small"
              [(ngModel)]="keyword"
              name="keyword"
              style="width: 200px; font-size: 12px"
            />
          </nz-form-control>
        </nz-form-item>

        <!-- Nút tìm kiếm với dropdown cho filter bổ sung -->
        <nz-form-item class="m-0">
          <nz-form-control>
            <div class="btn-group">
              <button
                nz-button
                nzType="primary"
                nzSize="small"
                (click)="onSearch()"
              >
                Tìm kiếm
              </button>
            </div>
          </nz-form-control>
        </nz-form-item>
      </form>
    </div>

    <!-- Content với tabs động -->
    <div
      class="card-body p-0"
      [class.with-search-bar]="shouldShowSearchBar"
      [class.without-search-bar]="!shouldShowSearchBar"
    >
      <div *ngIf="isLoading">
        <nz-spin
          [nzSpinning]="isLoading"
          nzSimple
          [style]="{
            position: 'absolute',
            top: '0',
            left: '0',
            width: '100%',
            height: '100%',
            background: 'rgba(255,255,255,0.4)',
            zIndex: '999',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
          }"
        ></nz-spin>
      </div>
      <div class="purchase-quote-summary">
        <angular-slickgrid
          [gridId]="gridId"
          [columns]="columnDefinitionsMaster"
          [options]="gridOptionsMaster"
          [dataset]="dataMaster"
          (onAngularGridCreated)="gridReady($event.detail)"
        >
        </angular-slickgrid>
      </div>
    </div>
  </div>
</ng-container>
