<ng-container class="w-100">
  <div class="card h-100 border-0 rounded-0" style="background: transparent">
    <div class="card-header bg-white p-0 position-relative">
      <p-menubar [model]="purchaseQuoteSummaryMenu" class="p-0 border-0 p-1">
        <ng-template #end>
          <div class="d-flex align-items-center gap-2">
            <button
              nz-button
              nzType="text"
              nzShape="circle"
              *ngIf="isMobile"
              (click)="ToggleSearchPanelNew()"
            >
              <span nz-icon nzType="search"></span>
            </button>
          </div>
        </ng-template>
      </p-menubar>
    </div>

    <!-- Filter bar - desktop -->
    <div
      class="filter-bar bg-light border-bottom p-1"
      *ngIf="!isMobile"
    >
      <ng-container *ngTemplateOutlet="searchFormTemplate; context: { isMobileView: false }"></ng-container>
    </div>

    <!-- Modal - mobile -->
    <nz-modal [(nzVisible)]="isShowModal" nzTitle="Tìm kiếm" nzWidth="100vw" nzCentered
        [nzBodyStyle]="{padding: '0px 24px' }" (nzOnCancel)="isShowModal = false" [nzFooter]="null">
        <ng-container *nzModalContent>
             <ng-container *ngTemplateOutlet="searchFormTemplate; context: { isMobileView: true }"></ng-container>
        </ng-container>
    </nz-modal>

    <ng-template #searchFormTemplate let-isMobileView="isMobileView">
      <form
        nz-form
        [nzLayout]="isMobileView ? 'vertical' : 'inline'"
        class="d-flex"
        [class.flex-column]="isMobileView"
        [class.flex-wrap]="!isMobileView"
        [class.align-items-center]="!isMobileView"
        style="gap: 8px"
      >
        <!-- Các filter mặc định hiển thị -->
        <nz-form-item [class.m-0]="!isMobileView" [class.w-100]="isMobileView">
          <nz-form-label class="fs-12" style="font-size: 12px">Từ ngày</nz-form-label>
          <nz-form-control>
            <input
              type="date"
              [(ngModel)]="dateStart"
              name="dateStart"
              [style.width]="isMobileView ? '100%' : '150px'"
              style="font-size: 12px; height: 24px; border: 1px solid #d9d9d9; border-radius: 2px; padding: 0 11px;"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item [class.m-0]="!isMobileView" [class.w-100]="isMobileView">
          <nz-form-label class="fs-12" style="font-size: 12px">Đến ngày</nz-form-label>
          <nz-form-control>
            <input
              type="date"
              [(ngModel)]="dateEnd"
              name="dateEnd"
              [style.width]="isMobileView ? '100%' : '150px'"
              style="font-size: 12px; height: 24px; border: 1px solid #d9d9d9; border-radius: 2px; padding: 0 11px;"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item [class.m-0]="!isMobileView" [class.w-100]="isMobileView">
          <nz-form-label class="fs-12">Phòng ban</nz-form-label>
          <nz-form-control>
            <nz-select
              name="departmentId"
              [(ngModel)]="departmentId"
              nzShowSearch
              nzPlaceHolder="--Chọn phòng ban--"
              nzSize="small"
              [style.width]="isMobileView ? '100%' : '250px'"
              [nzDisabled]="true"
            >
              <ng-container *ngFor="let option of departments">
                <nz-option [nzLabel]="option.Name" [nzValue]="option.ID"></nz-option>
              </ng-container>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item [class.m-0]="!isMobileView" [class.w-100]="isMobileView">
          <nz-form-label class="fs-12">Nhân viên</nz-form-label>
          <nz-form-control [nzSpan]="24">
            <nz-select
              name="employeeRequestId"
              nzSize="small"
              [style.width]="isMobileView ? '100%' : '280px'"
              nzShowSearch
              nzAllowClear
              nzPlaceHolder="--Chọn nhân viên--"
              [(ngModel)]="employeeRequestId"
              [nzDisabled]="!isTBP"
            >
              @for (parent of employeeRequests; track $index) {
                <nz-option-group [nzLabel]="parent.label">
                  @for (child of parent.options; track $index) {
                    <nz-option
                      nzCustomContent="true"
                      [nzLabel]="child.item?.Code + ' - ' + child.item?.FullName"
                      [nzValue]="child.item.EmployeeID"
                    >
                      {{ child.item.Code + " - " + child.item.FullName }}
                    </nz-option>
                  }
                </nz-option-group>
              }
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item [class.m-0]="!isMobileView" [class.w-100]="isMobileView">
          <nz-form-label class="fs-12" style="font-size: 12px">Từ khóa</nz-form-label>
          <nz-form-control>
            <input
              nz-input
              placeholder="Nhập từ khóa"
              nzSize="small"
              [(ngModel)]="keyword"
              name="keyword"
              [style.width]="isMobileView ? '100%' : '200px'"
              style="font-size: 12px"
            />
          </nz-form-control>
        </nz-form-item>

        <!-- Nút tìm kiếm -->
        <nz-form-item [class.m-0]="!isMobileView" [class.ms-auto]="!isMobileView" [class.w-100]="isMobileView" [class.mt-2]="isMobileView">
          <nz-form-control>
            <div class="btn-group" [class.w-100]="isMobileView">
              <button
                nz-button
                nzType="primary"
                [nzSize]="isMobileView ? 'default' : 'small'"
                [class.w-100]="isMobileView"
                (click)="onSearch()"
              >
                Tìm kiếm
              </button>
            </div>
          </nz-form-control>
        </nz-form-item>
      </form>
    </ng-template>

    <!-- Content với tabs động -->
    <div
      class="card-body p-0"
      [class.with-search-bar]="!isMobile"
      [class.without-search-bar]="isMobile"
    >
      <div *ngIf="isLoading">
        <nz-spin
          [nzSpinning]="isLoading"
          nzSimple
          [style]="{
            position: 'absolute',
            top: '0',
            left: '0',
            width: '100%',
            height: '100%',
            background: 'rgba(255,255,255,0.4)',
            zIndex: '999',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
          }"
        ></nz-spin>
      </div>
      <div class="purchase-quote-summary">
        <angular-slickgrid
          [gridId]="gridId"
          [columns]="columnDefinitionsMaster"
          [options]="gridOptionsMaster"
          [dataset]="dataMaster"
          (onAngularGridCreated)="gridReady($event.detail)"
        >
        </angular-slickgrid>
      </div>
    </div>
  </div>
</ng-container>
