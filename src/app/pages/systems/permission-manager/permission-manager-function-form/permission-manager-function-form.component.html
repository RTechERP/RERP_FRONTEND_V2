<div class="modal-header bg-primary py-2">
  <h6 class="modal-title text-uppercase text-white">
    {{ isEdit ? 'SỬA CHỨC NĂNG' : 'THÊM CHỨC NĂNG' }}
  </h6>
  <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
</div>

<div class="modal-body fs-12">
  <form nz-form [formGroup]="form" nzLayout="vertical">

    <div nz-row [nzGutter]="8">
      <div nz-col [nzSpan]="12">
        <nz-form-item class="mb-2">
          <nz-form-label [nzSpan]="24" class="p-0">
            Mã chức năng <span class="text-danger ps-1">*</span>
          </nz-form-label>
          <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng nhập mã chức năng">
            <input nz-input formControlName="Code" placeholder="Nhập mã chức năng" style="font-size: 12px;" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item class="mb-2">
          <nz-form-label [nzSpan]="24" class="p-0">
            Tên chức năng <span class="text-danger ps-1">*</span>
          </nz-form-label>
          <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng nhập tên chức năng">
            <input nz-input formControlName="Name" placeholder="Nhập tên chức năng" style="font-size: 12px;" />
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <nz-form-item class="mb-2">
      <nz-form-label [nzSpan]="24" class="p-0">
        Nhóm quyền <span class="text-danger ps-1">*</span>
      </nz-form-label>
      <nz-form-control [nzSpan]="24" nzErrorTip="Vui lòng chọn nhóm quyền">
        <nz-tree-select
          formControlName="FormAndFunctionGroupID"
          nzPlaceHolder="Chọn nhóm quyền"
          style="width: 100%; font-size: 12px;"
          nzShowSearch
          [nzNodes]="parentGroupTree"
          nzDefaultExpandAll
          [nzDropdownStyle]="{ 'max-height': '300px', 'overflow': 'auto', 'font-size': '12px' }"
          nzPlacement="bottomLeft">
        </nz-tree-select>
      </nz-form-control>
    </nz-form-item>

  </form>
</div>

<div class="modal-footer fs-12 py-2">
  <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onCancel()">
    Đóng
  </button>
  <button type="button" class="btn btn-primary btn-sm" (click)="onSubmit()">
    <i class="fa-solid fa-floppy-disk me-1"></i> Lưu
  </button>
</div>
