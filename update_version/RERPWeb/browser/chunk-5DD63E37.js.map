<div class="modal-header bg-primary text-uppercase py-2 flex-shrink-0 bill-import-synthetic-new-modal-header bill-import-synthetic-new-bg-primary bill-import-synthetic-new-text-uppercase bill-import-synthetic-new-py-2 bill-import-synthetic-new-flex-shrink-0">
  <h6 class="modal-title text-white bill-import-synthetic-new-modal-title bill-import-synthetic-new-text-white">Tổng hợp phiếu nhập</h6>
  <button
    type="button"
    class="btn-close bill-import-synthetic-new-btn-close"
    (click)="closeModal()"
    aria-label="Close"
  ></button>
</div>

<div class="modal-body p-1 flex-grow-1 overflow-hidden bill-import-synthetic-new-modal-body bill-import-synthetic-new-p-1 bill-import-synthetic-new-flex-grow-1 bill-import-synthetic-new-overflow-hidden">
  <div class="p-2 border-bottom bill-import-synthetic-new-p-2 bill-import-synthetic-new-border-bottom">
    <form nz-form nzLayout="vertical">
      <div nz-row [nzGutter]="8">
        <!-- Từ ngày -->
        <div nz-col [nzXs]="12" [nzSm]="6" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">Từ</nz-form-label>
            <nz-form-control>
              <nz-date-picker
                [nzFormat]="dateFormat"
                nzSize="small"
                [(ngModel)]="searchParams.dateStart"
                name="dateStart"
                [nzDisabled]="checked"
                class="w-100 bill-import-synthetic-new-w-100"
                [nzAllowClear]="false"
              ></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Đến ngày -->
        <div nz-col [nzXs]="12" [nzSm]="6" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">Đến</nz-form-label>
            <nz-form-control>
              <nz-date-picker
                [nzFormat]="dateFormat"
                nzSize="small"
                [(ngModel)]="searchParams.dateEnd"
                name="dateEnd"
                [nzDisabled]="checked"
                class="w-100 bill-import-synthetic-new-w-100"
                [nzAllowClear]="false"
              ></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Checkbox -->
        <div nz-col [nzXs]="8" [nzSm]="4" [nzMd]="3" [nzLg]="2">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <label
                nz-checkbox
                [(ngModel)]="checked"
                name="checked"
                (ngModelChange)="onCheckboxChange()"
              >
                Tất cả
              </label>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Lọc kho -->
        <div nz-col [nzXs]="16" [nzSm]="12" [nzMd]="6" [nzLg]="4">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">Lọc kho</nz-form-label>
            <nz-form-control>
              <nz-select
                [(ngModel)]="selectedKhoTypes"
                (ngModelChange)="onKhoTypeChange($event)"
                [nzMode]="'multiple'"
                [nzPlaceHolder]="'Chọn nhóm kho'"
                [nzMaxTagCount]="1"
                nzSize="small"
                class="w-100 bill-import-synthetic-new-w-100"
                name="selectedKhoTypes"
              >
                <nz-option
                  *ngFor="let item of dataProductGroup"
                  [nzLabel]="item.ProductGroupName"
                  [nzValue]="item.ID"
                ></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Lọc phiếu -->
        <div nz-col [nzXs]="24" [nzSm]="12" [nzMd]="6" [nzLg]="3">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">Lọc phiếu</nz-form-label>
            <nz-form-control>
              <nz-select
                nzShowSearch
                nzAllowClear
                nzSize="small"
                [(ngModel)]="searchParams.status"
                name="status"
                class="w-100 bill-import-synthetic-new-w-100"
              >
                <nz-option
                  *ngFor="let item of cbbStatus"
                  [nzValue]="item.ID"
                  [nzLabel]="item.Name"
                >
                  <div class="d-flex align-items-center bill-import-synthetic-new-d-flex bill-import-synthetic-new-align-items-center">
                    <span class="me-2 bill-import-synthetic-new-me-2">{{ item.ID }}</span>
                    <span>{{ item.Name }}</span>
                  </div>
                </nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Từ khóa -->
        <div nz-col [nzXs]="12" [nzSm]="8" [nzMd]="5" [nzLg]="3">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">Từ khóa</nz-form-label>
            <nz-form-control>
              <input
                nz-input
                placeholder="Nhập từ khóa"
                [(ngModel)]="searchParams.keyword"
                name="keyword"
                nzSize="small"
                class="w-100 bill-import-synthetic-new-w-100"
              />
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Nút tìm kiếm -->
        <div nz-col [nzXs]="6" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button
                class="fs-12 btn w-100 bill-import-synthetic-new-fs-12 bill-import-synthetic-new-btn bill-import-synthetic-new-w-100"
                nz-button
                nzType="primary"
                nzSize="small"
                (click)="loadDataBillImportSynthetic()"
              >
                Tìm kiếm
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Nút Xuất Excel -->
        <div nz-col [nzXs]="6" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button
                class="fs-12 btn w-100 bill-import-synthetic-new-fs-12 bill-import-synthetic-new-btn bill-import-synthetic-new-w-100"
                nz-button
                nzType="default"
                nzSize="small"
                title="Xuất Excel"
                (click)="exportExcel()"
              >
                <nz-icon nzType="file-excel"></nz-icon> Excel
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Nút Lưu -->
        <div nz-col [nzXs]="12" [nzSm]="4" [nzMd]="4" [nzLg]="2">
          <nz-form-item class="mb-0 bill-import-synthetic-new-mb-0">
            <nz-form-label class="fs-12 bill-import-synthetic-new-fs-12">&nbsp;</nz-form-label>
            <nz-form-control>
              <button
                class="fs-12 btn w-100 bill-import-synthetic-new-fs-12 bill-import-synthetic-new-btn bill-import-synthetic-new-w-100"
                nz-button
                nzType="primary"
                *hasPermission="'N35'"
                nzSize="small"
                (click)="saveData()"
              >
                Lưu
              </button>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </div>

  <!-- SlickGrid Container -->
  <div id="gridContainer" class="card-body w-100 position-relative bill-import-synthetic-new-card-body bill-import-synthetic-new-w-100 bill-import-synthetic-new-position-relative">
    <angular-slickgrid
      [gridId]="gridId"
      [columns]="columnDefinitions"
      [options]="gridOptions"
      [dataset]="dataset"
      (onAngularGridCreated)="angularGridReady($event.detail)"
    ></angular-slickgrid>

    <!-- Loading Spinner -->
    <div
      *ngIf="isLoading"
      class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bill-import-synthetic-new-position-absolute bill-import-synthetic-new-top-0 bill-import-synthetic-new-start-0 bill-import-synthetic-new-w-100 bill-import-synthetic-new-h-100 bill-import-synthetic-new-d-flex bill-import-synthetic-new-align-items-center bill-import-synthetic-new-justify-content-center"
      style="background: rgba(255, 255, 255, 0.8); z-index: 1000"
    >
      <nz-spin [nzSpinning]="true" nzTip="Đang tải dữ liệu..."></nz-spin>
    </div>
  </div>
</div>
